<body style="margin:0">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── UTILS ────────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
const todayStr = () => new Date().toLocaleDateString("it-IT");

function calcPoints(type, cappotto, soglia, callerWon) {
  const isAlone = type === "mano" || type === "carichi";
  const base = isAlone ? 4 : 2;
  const sogl = soglia >= 81 ? 3 : soglia >= 71 ? 2 : 1;
  const mult = sogl * (cappotto ? 2 : 1);
  if (callerWon) return { caller: base * mult, partner: isAlone ? 0 : mult, opponent: -mult };
  return { caller: -(base * mult), partner: isAlone ? 0 : -mult, opponent: mult };
}

function sumPts(pid, games) {
  return games.reduce((a, g) => a + (g.pm ? (g.pm[pid] || 0) : 0), 0);
}

// ── DESIGN ───────────────────────────────────────────────────────────────────
const C = {
  bg: "#080604", surface: "#120e08", surface2: "#1c1510", border: "#2e1f0e",
  gold: "#c8a45a", red: "#b53a2f", green: "#2e7d4f", purple: "#7b3fa0",
  text: "#ede4d3", muted: "#7a6a55",
};
const card = { background: C.surface, border: "1px solid " + C.border, borderRadius: 12, padding: 16 };
const btnP = {
  background: "linear-gradient(135deg, #a07828, #c8a45a)",
  color: "#1a0e00", border: "none", borderRadius: 8,
  padding: "11px 22px", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
};
const btnG = (color) => ({
  background: "transparent", color: color || C.gold,
  border: "1px solid " + (color || C.gold) + "44", borderRadius: 8,
  padding: "9px 16px", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit", width: "100%",
});
const btnD = {
  background: "transparent", color: C.red, border: "1px solid " + C.red + "44",
  borderRadius: 6, padding: "5px 12px", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit",
};
const inpStyle = {
  background: "#0c0906", border: "1px solid " + C.border, borderRadius: 8,
  color: C.text, padding: "10px 14px", fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%",
};

// ── MICRO COMPONENTS ─────────────────────────────────────────────────────────
const Pts = ({ v, size }) => (
  <span style={{ fontWeight: 800, fontSize: size || 15, color: v > 0 ? C.green : v < 0 ? C.red : C.muted }}>
    {v > 0 ? "+" : ""}{v}
  </span>
);

const Badge = ({ children, color }) => (
  <span style={{
    background: (color || C.gold) + "20", color: color || C.gold,
    border: "1px solid " + (color || C.gold) + "40",
    borderRadius: 4, padding: "2px 7px", fontSize: 11, fontWeight: 700,
  }}>{children}</span>
);

// ── DIALOGS ───────────────────────────────────────────────────────────────────
function Confirm({ title, msg, onOk, onCancel }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 9000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ ...card, maxWidth: 320, width: "100%", textAlign: "center", border: "1px solid " + C.gold }}>
        <div style={{ fontSize: 32, marginBottom: 10 }}>⚠️</div>
        <div style={{ color: C.gold, fontWeight: 800, fontSize: 16, fontFamily: "'Playfair Display',serif", marginBottom: 8 }}>{title}</div>
        <div style={{ color: C.text, fontSize: 13, lineHeight: 1.6, marginBottom: 20 }}>{msg}</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onCancel} style={{ ...btnG(C.muted), flex: 1 }}>Annulla</button>
          <button onClick={onOk} style={{ ...btnP, flex: 1 }}>Conferma</button>
        </div>
      </div>
    </div>
  );
}

function Info({ title, lines, onOk }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 9000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ ...card, maxWidth: 320, width: "100%", textAlign: "center", border: "1px solid " + C.green }}>
        <div style={{ fontSize: 32, marginBottom: 10 }}>✅</div>
        <div style={{ color: C.gold, fontWeight: 800, fontSize: 16, fontFamily: "'Playfair Display',serif", marginBottom: 8 }}>{title}</div>
        <div style={{ textAlign: "left", marginBottom: 20 }}>
          {(lines || []).map((l, i) => (
            <div key={i} style={{ color: l.startsWith("─") ? C.muted : C.text, fontSize: 13, padding: "3px 0", borderBottom: i < lines.length - 1 ? "1px solid " + C.border : "none" }}>{l}</div>
          ))}
        </div>
        <button onClick={onOk} style={{ ...btnP, width: "100%" }}>OK</button>
      </div>
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000bb", zIndex: 5000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={onClose}>
      <div style={{ ...card, maxWidth: 440, width: "100%", maxHeight: "85vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <span style={{ color: C.gold, fontFamily: "'Playfair Display',serif", fontWeight: 700, fontSize: 17 }}>{title}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 22, cursor: "pointer" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── RANK LIST ─────────────────────────────────────────────────────────────────
function RankList({ rows }) {
  if (!rows || !rows.length) return <div style={{ color: C.muted, textAlign: "center", padding: "30px 0" }}>Nessun dato.</div>;
  const medals = ["🥇", "🥈", "🥉"];
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
      {rows.map((r, i) => (
        <div key={r.id || i} style={{
          display: "flex", alignItems: "center", gap: 12, padding: "10px 14px",
          background: i === 0 ? "linear-gradient(135deg,#1e1508,#2a1c0c)" : C.surface,
          border: "1px solid " + (i === 0 ? C.gold : C.border), borderRadius: 10,
          boxShadow: i === 0 ? "0 0 18px " + C.gold + "18" : "none",
        }}>
          <span style={{ fontSize: 18, width: 26, textAlign: "center", flexShrink: 0 }}>{medals[i] || ("#" + (i + 1))}</span>
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{r.name}</div>
            {r.sub && <div style={{ color: C.muted, fontSize: 11, marginTop: 1 }}>{r.sub}</div>}
          </div>
          <Pts v={r.pts} size={16} />
        </div>
      ))}
    </div>
  );
}

function ProgBar({ name, pts, max }) {
  const m = max || 15;
  const pct = Math.min(100, Math.max(0, pts / m * 100));
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
        <span style={{ color: C.text }}>{name}</span>
        <span style={{ fontWeight: 700, color: pts >= m ? C.green : C.gold }}>{pts}/{m}</span>
      </div>
      <div style={{ background: C.border, borderRadius: 4, height: 5, overflow: "hidden" }}>
        <div style={{ height: "100%", borderRadius: 4, width: pct + "%", background: pts >= m ? C.green : "linear-gradient(90deg, #8a6228, #c8a45a)", transition: "width .4s ease" }} />
      </div>
    </div>
  );
}

// ── FIREBASE HOOK ─────────────────────────────────────────────────────────────
function useFirebase(loadDb) {
  const [status, setStatus] = useState("connecting");
  const unsubRef = useRef(null);

  useEffect(() => {
    const init = () => {
      setStatus("ok");
      unsubRef.current = window.__fbListen(loadDb);
    };
    if (window.__fbReady) init();
    else window.addEventListener("fbReady", init, { once: true });
    const timer = setTimeout(() => setStatus(s => s === "connecting" ? "disabled" : s), 5000);
    return () => { clearTimeout(timer); if (unsubRef.current) unsubRef.current(); };
  }, []);

  const save = async (data) => {
    if (status !== "ok") return;
    setStatus("saving");
    const ok = await window.__fbSave(data);
    setStatus(ok ? "ok" : "error");
    if (!ok) setTimeout(() => setStatus("ok"), 3000);
  };

  return { status, save };
}

function FbBadge({ status }) {
  const conf = {
    connecting: { color: C.gold,   icon: "⏳", label: "connessione..." },
    ok:         { color: C.green,  icon: "☁️",  label: "sincronizzato" },
    saving:     { color: C.gold,   icon: "💾", label: "salvataggio..." },
    error:      { color: C.red,    icon: "⚠️", label: "errore sync" },
    disabled:   { color: C.muted,  icon: "💾", label: "locale" },
  };
  const c = conf[status] || conf.disabled;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 5, background: c.color + "22", border: "1px solid " + c.color + "44", borderRadius: 20, padding: "3px 10px" }}>
      <span style={{ fontSize: 12 }}>{c.icon}</span>
      <span style={{ fontSize: 10, fontWeight: 700, color: c.color, letterSpacing: 0.5 }}>{c.label.toUpperCase()}</span>
    </div>
  );
}

// ── PAGE: CLASSIFICHE ─────────────────────────────────────────────────────────
function PageClassifiche({ players, allGames, raggioDays, giornoGames, raggi, onChiudiRaggio }) {
  const [tab, setTab] = useState("raggio");

  const giornoRows = players
    .filter(p => giornoGames.some(g => g.pids && g.pids.includes(p.id)))
    .map(p => ({ id: p.id, name: p.name, pts: sumPts(p.id, giornoGames) }))
    .sort((a, b) => b.pts - a.pts);

  const raggioRows = players
    .map(p => ({
      id: p.id, name: p.name,
      pts: raggioDays.reduce((a, d) => a + (d.totals ? (d.totals[p.id] || 0) : 0), 0)
           + sumPts(p.id, giornoGames),
      sub: raggioDays.length + " giornate + oggi",
    }))
    .filter(r => raggioDays.some(d => d.totals && d.totals[r.id] !== undefined) || giornoGames.some(g => g.pids && g.pids.includes(r.id)))
    .sort((a, b) => b.pts - a.pts);

  const genRows = players
    .map(p => {
      const mg = allGames.filter(g => g.pids && g.pids.includes(p.id));
      const won = mg.filter(g => (g.pm ? (g.pm[p.id] || 0) : 0) > 0).length;
      return {
        id: p.id, name: p.name, pts: sumPts(p.id, allGames),
        sub: mg.length + " partite · " + (mg.length ? Math.round(won / mg.length * 100) : 0) + "% win",
      };
    })
    .filter(r => allGames.some(g => g.pids && g.pids.includes(r.id)))
    .sort((a, b) => b.pts - a.pts);

  const TABS = [
    { id: "giorno", label: "☀️ Oggi" },
    { id: "raggio", label: "⚡ Raggio" },
    { id: "generale", label: "🏆 Generale" },
    { id: "storia", label: "📚 Raggi" },
  ];

  return (
    <div>
      <h2 style={{ color: C.gold, fontFamily: "'Playfair Display',serif", fontSize: 22, marginBottom: 16 }}>Classifiche</h2>
      <div style={{ display: "flex", gap: 6, marginBottom: 18, overflowX: "auto", paddingBottom: 2 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: "7px 14px", borderRadius: 20, cursor: "pointer", whiteSpace: "nowrap",
            fontWeight: 700, fontSize: 12, fontFamily: "inherit",
            background: tab === t.id ? C.gold : "transparent",
            color: tab === t.id ? "#180e00" : C.muted,
            border: "1px solid " + (tab === t.id ? C.gold : C.border),
          }}>{t.label}</button>
        ))}
      </div>

      {tab === "giorno" && (
        <div>
          <div style={{ color: C.muted, fontSize: 12, marginBottom: 12 }}>Giornata in corso · {giornoGames.length} partite</div>
          <RankList rows={giornoRows} />
        </div>
      )}

      {tab === "raggio" && (
        <div>
          {raggioRows[0] && raggioRows[0].pts >= 12 && (
            <div style={{ background: "#1e1200", border: "1px solid " + C.gold, borderRadius: 8, padding: "10px 14px", marginBottom: 12, display: "flex", gap: 10, alignItems: "center" }}>
              <span style={{ fontSize: 20 }}>⚠️</span>
              <span style={{ color: C.gold, fontSize: 13, fontWeight: 700 }}>{raggioRows[0].name} è a {raggioRows[0].pts} punti!</span>
            </div>
          )}
          <div style={{ color: C.muted, fontSize: 12, marginBottom: 12 }}>{raggioDays.length} giornate chiuse · soglia 15 punti</div>
          <RankList rows={raggioRows} />
          {raggioRows.length > 0 && (
            <div style={{ ...card, marginTop: 14 }}>
              <div style={{ color: C.muted, fontSize: 11, marginBottom: 10, letterSpacing: 1 }}>PROGRESSIONE</div>
              {raggioRows.map(r => <ProgBar key={r.id} name={r.name} pts={r.pts} />)}
            </div>
          )}
          <button onClick={onChiudiRaggio} style={{ ...btnP, width: "100%", marginTop: 14, padding: 13, fontSize: 14, background: "linear-gradient(135deg, #5a1870, #8e44ad)", color: "#fff" }}>
            🏁 Chiudi Raggio
          </button>
        </div>
      )}

      {tab === "generale" && (
        <div>
          <div style={{ color: C.muted, fontSize: 12, marginBottom: 12 }}>Tutte le partite di sempre</div>
          <RankList rows={genRows} />
        </div>
      )}

      {tab === "storia" && (
        <div>
          <div style={{ color: C.muted, fontSize: 12, marginBottom: 12 }}>{raggi.length} raggi completati</div>
          {raggi.length === 0 && <div style={{ color: C.muted, textAlign: "center", padding: 30 }}>Nessun raggio completato.</div>}
          {[...raggi].reverse().map((r, i) => (
            <div key={r.id} style={{ ...card, marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ color: C.gold, fontWeight: 700 }}>Raggio #{raggi.length - i}</span>
                <span style={{ color: C.muted, fontSize: 11 }}>{r.startDate} → {r.endDate} · {r.days}gg</span>
              </div>
              {r.winner && (
                <div style={{ background: "#160a24", border: "1px solid " + C.purple + "44", borderRadius: 6, padding: "7px 12px", marginBottom: 8, display: "flex", gap: 8, alignItems: "center" }}>
                  <span>🏆</span>
                  <span style={{ color: "#c39bd3", fontWeight: 700 }}>{r.winner} — {r.winnerPts} punti</span>
                </div>
              )}
              {(r.scores || []).slice().sort((a, b) => b.pts - a.pts).map(s => (
                <div key={s.pid} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "2px 0" }}>
                  <span style={{ color: C.text }}>{s.name}</span><Pts v={s.pts} />
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── PAGE: GIOCATORI ───────────────────────────────────────────────────────────
function PageGiocatori({ players, setPlayers, allGames }) {
  const [name, setName] = useState("");
  const [selId, setSelId] = useState(null);

  const stats = players.map(p => {
    const mg = allGames.filter(g => g.pids && g.pids.includes(p.id));
    const won = mg.filter(g => (g.pm ? (g.pm[p.id] || 0) : 0) > 0).length;
    return { ...p, played: mg.length, won, lost: mg.filter(g => (g.pm ? (g.pm[p.id] || 0) : 0) < 0).length,
      totalPts: sumPts(p.id, allGames), asCaller: mg.filter(g => g.callerId === p.id).length,
      asPartner: mg.filter(g => g.partnerId === p.id).length,
      winRate: mg.length ? Math.round(won / mg.length * 100) : 0 };
  });
  const sel = stats.find(p => p.id === selId);

  const add = () => {
    const n = name.trim();
    if (!n) return;
    if (players.find(p => p.name.toLowerCase() === n.toLowerCase())) return;
    setPlayers(ps => [...ps, { id: uid(), name: n }]);
    setName("");
  };

  return (
    <div>
      <h2 style={{ color: C.gold, fontFamily: "'Playfair Display',serif", fontSize: 22, marginBottom: 18 }}>👤 Giocatori</h2>
      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} placeholder="Nome..." style={inpStyle} />
        <button onClick={add} style={{ ...btnP, flexShrink: 0 }}>Aggiungi</button>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {stats.map(p => (
          <div key={p.id} style={{ ...card, display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }} onClick={() => setSelId(p.id)}>
            <div style={{ width: 38, height: 38, borderRadius: "50%", flexShrink: 0, fontWeight: 800, fontSize: 15, background: "linear-gradient(135deg, #2a1a08, #c8a45a)", display: "flex", alignItems: "center", justifyContent: "center", color: "#180e00" }}>
              {p.name[0].toUpperCase()}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ color: C.text, fontWeight: 700 }}>{p.name}</div>
              <div style={{ color: C.muted, fontSize: 11, marginTop: 1 }}>{p.played} partite · {p.winRate}% win</div>
            </div>
            <Pts v={p.totalPts} />
            <button onClick={e => { e.stopPropagation(); setPlayers(ps => ps.filter(x => x.id !== p.id)); }} style={btnD}>✕</button>
          </div>
        ))}
      </div>
      {sel && (
        <Modal title={"📊 " + sel.name} onClose={() => setSelId(null)}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 14 }}>
            {[["Partite", sel.played, C.muted], ["Vittorie", sel.won, C.green], ["Sconfitte", sel.lost, C.red],
              ["Punti", sel.totalPts > 0 ? "+" + sel.totalPts : sel.totalPts, C.gold],
              ["Win %", sel.winRate + "%", C.gold], ["Da socio", sel.asPartner, C.muted]].map(([l, v, c]) => (
              <div key={l} style={{ textAlign: "center", background: C.bg, borderRadius: 8, padding: "10px 6px" }}>
                <div style={{ color: c, fontWeight: 800, fontSize: 20 }}>{v}</div>
                <div style={{ color: C.muted, fontSize: 10, marginTop: 2 }}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{ color: C.muted, fontSize: 12, textAlign: "center" }}>Chiamante {sel.asCaller}× · Socio {sel.asPartner}×</div>
        </Modal>
      )}
    </div>
  );
}

// ── PAGE: PARTITA ─────────────────────────────────────────────────────────────
function PagePartita({ players, addGame, tableIds, setTableIds, giornoGames, raggioDays, onChiudiGiornata, onChiudiRaggio, callerId, setCallerId, partnerId, setPartnerId, callType, setCallType, soglia, setSoglia, cappotto, setCappotto, callerWon, setCallerWon, date, setDate }) {
  const toggleP = id => setTableIds(prev =>
    prev.includes(id) ? prev.filter(x => x !== id) : prev.length < 5 ? [...prev, id] : prev
  );

  const selPlayers = players.filter(p => tableIds.includes(p.id));
  const isAlone = callType === "mano" || callType === "carichi";
  const sogliaMult = soglia >= 81 ? 3 : soglia >= 71 ? 2 : 1;
  const ready = tableIds.length === 5;
  const canSave = callerId && callerWon !== null && (isAlone || partnerId);

  const reset = () => { setCallerId(""); setPartnerId(""); setCallType("normale"); setSoglia(61); setCappotto(false); setCallerWon(null); };

  const save = () => {
    if (!canSave) return;
    const { caller, partner, opponent } = calcPoints(callType, cappotto, soglia, callerWon);
    const pm = {};
    tableIds.forEach(id => {
      pm[id] = id === callerId ? caller : (id === partnerId && !isAlone) ? partner : opponent;
    });
    addGame({ id: uid(), date, pids: tableIds, callerId, partnerId: isAlone ? null : partnerId, callType, soglia, cappotto, callerWon, pm });
    reset();
  };

  const preview = canSave ? calcPoints(callType, cappotto, soglia, callerWon) : null;

  const giornoRows = players
    .filter(p => giornoGames.some(g => g.pids && g.pids.includes(p.id)))
    .map(p => ({ id: p.id, name: p.name, pts: sumPts(p.id, giornoGames) }))
    .sort((a, b) => b.pts - a.pts);

  const raggioRows = players
    .map(p => ({
      id: p.id, name: p.name,
      pts: raggioDays.reduce((a, d) => a + (d.totals ? (d.totals[p.id] || 0) : 0), 0)
           + sumPts(p.id, giornoGames),
    }))
    .filter(r => raggioDays.some(d => d.totals && d.totals[r.id] !== undefined) || giornoGames.some(g => g.pids && g.pids.includes(r.id)))
    .sort((a, b) => b.pts - a.pts);

  return (
    <div>
      <h2 style={{ color: C.gold, fontFamily: "'Playfair Display',serif", fontSize: 22, marginBottom: 12 }}>🃏 Partita</h2>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        <div style={{ ...card, padding: 12 }}>
          <div style={{ color: C.gold, fontWeight: 700, fontSize: 11, letterSpacing: 1, marginBottom: 8 }}>☀️ OGGI ({giornoGames.length})</div>
          {giornoRows.length === 0 ? <div style={{ color: C.muted, fontSize: 11 }}>—</div>
            : giornoRows.map((r, i) => (
              <div key={r.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                <span style={{ color: i === 0 ? C.gold : C.text }}>{r.name}</span>
                <Pts v={r.pts} size={12} />
              </div>
            ))}
          <button onClick={onChiudiGiornata} style={{ ...btnG(C.green), marginTop: 10, fontSize: 11 }}>☀️ Chiudi giornata</button>
        </div>

        <div style={{ ...card, padding: 12 }}>
          <div style={{ color: C.purple, fontWeight: 700, fontSize: 11, letterSpacing: 1, marginBottom: 8 }}>⚡ RAGGIO ({raggioDays.length}gg)</div>
          {raggioRows.length === 0 ? <div style={{ color: C.muted, fontSize: 11 }}>—</div>
            : raggioRows.map((r, i) => (
              <div key={r.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                <span style={{ color: i === 0 ? C.gold : C.text }}>{r.name}</span>
                <span style={{ fontWeight: 700, fontSize: 12, color: r.pts >= 15 ? C.green : r.pts > 0 ? C.gold : r.pts < 0 ? C.red : C.muted }}>{r.pts}/15</span>
              </div>
            ))}
          <button onClick={onChiudiRaggio} style={{ ...btnG("#c39bd3"), marginTop: 10, fontSize: 11 }}>🏁 Chiudi raggio</button>
        </div>
      </div>

      <div style={{ ...card, marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ color: C.gold, fontWeight: 700 }}>{ready ? "🪑 Tavolo" : "Scegli 5 giocatori (" + tableIds.length + "/5)"}</span>
          {ready && <button onClick={() => { setTableIds([]); reset(); }} style={{ ...btnD, padding: "4px 10px", fontSize: 11 }}>Cambia</button>}
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {players.map(p => (
            <button key={p.id} onClick={() => toggleP(p.id)} style={{
              padding: "8px 14px", borderRadius: 7, cursor: "pointer", fontWeight: 700, fontSize: 13, fontFamily: "inherit",
              opacity: ready && !tableIds.includes(p.id) ? 0.2 : 1,
              background: tableIds.includes(p.id) ? C.gold : "transparent",
              color: tableIds.includes(p.id) ? "#180e00" : C.muted,
              border: "1px solid " + (tableIds.includes(p.id) ? C.gold : C.border),
            }}>{p.name}</button>
          ))}
        </div>
      </div>

      {ready && (
        <div>
          <div style={{ ...card, marginBottom: 12 }}>
            <div style={{ color: C.gold, fontWeight: 700, marginBottom: 14 }}>Asta e Chiamata</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ color: C.muted, fontSize: 13, flexShrink: 0 }}>Data:</span>
                <input value={date} onChange={e => setDate(e.target.value)} style={{ ...inpStyle, width: 120 }} />
              </div>
              <div>
                <div style={{ color: C.muted, fontSize: 12, marginBottom: 5 }}>Chi ha chiamato?</div>
                <select value={callerId} onChange={e => setCallerId(e.target.value)} style={inpStyle}>
                  <option value="">— seleziona —</option>
                  {selPlayers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
              <div>
                <div style={{ color: C.muted, fontSize: 12, marginBottom: 6 }}>Tipo chiamata</div>
                <div style={{ display: "flex", gap: 7 }}>
                  {[["normale", "Normale"], ["mano", "In Mano"], ["carichi", "Carichi"]].map(([v, l]) => (
                    <button key={v} onClick={() => setCallType(v)} style={{
                      flex: 1, padding: "9px 0", borderRadius: 7, cursor: "pointer", fontWeight: 700, fontSize: 12, fontFamily: "inherit",
                      background: callType === v ? C.gold : "transparent",
                      color: callType === v ? "#180e00" : C.muted,
                      border: "1px solid " + (callType === v ? C.gold : C.border),
                    }}>{l}</button>
                  ))}
                </div>
              </div>
              {!isAlone && callerId && (
                <div>
                  <div style={{ color: C.muted, fontSize: 12, marginBottom: 5 }}>Socio segreto</div>
                  <select value={partnerId} onChange={e => setPartnerId(e.target.value)} style={inpStyle}>
                    <option value="">— seleziona —</option>
                    {selPlayers.filter(p => p.id !== callerId).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                </div>
              )}
              <div>
                <div style={{ color: C.muted, fontSize: 12, marginBottom: 4 }}>
                  Soglia: <strong style={{ color: C.gold }}>{soglia}</strong>
                  {sogliaMult > 1 && <span style={{ marginLeft: 8 }}><Badge color={sogliaMult === 3 ? C.red : "#d4870a"}>{sogliaMult === 2 ? "×2 DOPPIA" : "×3 TRIPLA"}</Badge></span>}
                </div>
                <input type="range" min={61} max={120} value={soglia} onChange={e => setSoglia(Number(e.target.value))} style={{ width: "100%", accentColor: C.gold }} />
                <div style={{ display: "flex", justifyContent: "space-between", color: C.muted, fontSize: 10 }}>
                  <span>61</span><span>71 ×2</span><span>81 ×3</span><span>120</span>
                </div>
              </div>
            </div>
          </div>

          {callerId && (isAlone || partnerId) && (
            <div style={{ ...card, marginBottom: 12 }}>
              <div style={{ color: C.gold, fontWeight: 700, marginBottom: 12 }}>Risultato</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                {[[true, "✅ Vince", C.green], [false, "❌ Perde", C.red]].map(([v, l, col]) => (
                  <button key={String(v)} onClick={() => setCallerWon(v)} style={{
                    flex: 1, padding: 12, borderRadius: 8, cursor: "pointer", fontWeight: 800, fontSize: 13, fontFamily: "inherit",
                    background: callerWon === v ? col : "transparent",
                    color: callerWon === v ? "#fff" : C.muted,
                    border: "1px solid " + (callerWon === v ? col : C.border),
                  }}>{l}</button>
                ))}
              </div>
              <div style={{ marginBottom: 16 }}>
                <button onClick={() => setCappotto(!cappotto)} style={{
                  padding: "8px 16px", borderRadius: 7, cursor: "pointer", fontWeight: 700, fontFamily: "inherit",
                  background: cappotto ? C.purple : "transparent",
                  color: cappotto ? "#fff" : C.muted,
                  border: "1px solid " + (cappotto ? C.purple : C.border),
                }}>🎩 Cappotto{cappotto ? " ×2" : "?"}</button>
              </div>
              {preview && (
                <div style={{ background: C.bg, borderRadius: 8, padding: 14, marginBottom: 16 }}>
                  {tableIds.map(id => {
                    const p = players.find(x => x.id === id);
                    const pt = id === callerId ? preview.caller : (id === partnerId && !isAlone) ? preview.partner : preview.opponent;
                    const role = id === callerId ? "chiamante" : (id === partnerId && !isAlone) ? "socio" : "avversario";
                    return (
                      <div key={id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                        <span style={{ color: C.text, fontSize: 13 }}>{p ? p.name : "?"} <span style={{ color: C.muted, fontSize: 11 }}>({role})</span></span>
                        <Pts v={pt} />
                      </div>
                    );
                  })}
                  <div style={{ borderTop: "1px solid " + C.border, marginTop: 8, paddingTop: 8, color: C.muted, fontSize: 11 }}>
                    Moltiplicatore: <strong style={{ color: C.gold }}>{sogliaMult * (cappotto ? 2 : 1)}×</strong>
                  </div>
                </div>
              )}
              <button onClick={save} disabled={!canSave} style={{ ...btnP, width: "100%", padding: 14, fontSize: 15, opacity: canSave ? 1 : 0.4 }}>
                💾 Salva Partita
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── PAGE: DATI ────────────────────────────────────────────────────────────────
function PageDati({ players, setPlayers, addGames, db, loadDb }) {
  const [msg, setMsg] = useState("");
  const [preview, setPreview] = useState(null);
  const [importMode, setImportMode] = useState("aggiungi");

  const FIXED = ["data", "chiamante", "tipo", "soglia", "cappotto", "esito"];

  const isBriscoloneFormat = headers => {
    const lower = headers.map(h => h.toLowerCase());
    return FIXED.every(c => lower.includes(c));
  };

  const parseCSV = text => {
    // Strip BOM
    const clean = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
    const lines = clean.split("\n").filter(l => l.trim().replace("\r", "").length > 0);
    return lines.map(line => {
      const row = [];
      let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === "," && !inQ) { row.push(cur.trim()); cur = ""; }
        else if (ch !== "\r") cur += ch;
      }
      row.push(cur.trim());
      return row;
    });
  };

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith(".csv")) { setMsg("⚠️ Solo file .csv supportati."); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = parseCSV(ev.target.result);
      if (rows.length < 2) { setMsg("File vuoto."); return; }
      setPreview({ headers: rows[0], rows: rows.slice(1).filter(r => r.some(c => c !== "")), isBriscolone: isBriscoloneFormat(rows[0]) });
      setMsg("");
    };
    reader.readAsText(file, "UTF-8");
  };

  const buildGames = (headers, rows, basePlayers) => {
    const lower = headers.map(h => h.toLowerCase());
    const ci = name => lower.indexOf(name);
    const isBrisco = isBriscoloneFormat(headers);
    const pCols = headers.map((h, i) => ({ name: h, i })).filter(c => !FIXED.includes(c.name.toLowerCase()) && c.name.trim());
    // For generic format, also exclude "date" column
    const genericPCols = isBrisco ? pCols : headers.map((h, i) => ({ name: h, i })).filter(c => {
      const l = c.name.toLowerCase();
      return l !== "data" && l !== "date" && c.name.trim();
    });
    const usedCols = isBrisco ? pCols : genericPCols;

    let np = [...basePlayers];
    usedCols.forEach(({ name }) => {
      if (!np.find(p => p.name.toLowerCase() === name.toLowerCase()))
        np.push({ id: uid(), name });
    });

    const games = [];
    rows.forEach(row => {
      const pids = [], pm = {};
      usedCols.forEach(({ name, i }) => {
        const v = row[i];
        if (v === "" || v === undefined) return;
        const pt = Number(v);
        if (isNaN(pt)) return;
        const p = np.find(x => x.name.toLowerCase() === name.toLowerCase());
        if (!p) return;
        pids.push(p.id);
        pm[p.id] = pt;
      });
      if (pids.length < 2) return;

      let date, callType, soglia, cappotto, callerWon, callerId;
      if (isBrisco) {
        date     = row[ci("data")] || todayStr();
        callType = row[ci("tipo")] || "import";
        soglia   = Number(row[ci("soglia")]) || 61;
        cappotto = (row[ci("cappotto")] || "").toLowerCase() === "sì";
        callerWon = (row[ci("esito")] || "").toLowerCase() === "vince";
        const callerName = row[ci("chiamante")] || "";
        const cp = np.find(p => p.name.toLowerCase() === callerName.toLowerCase());
        callerId = cp ? cp.id : pids.slice().sort((a, b) => (pm[b] || 0) - (pm[a] || 0))[0];
      } else {
        const dIdx = lower.indexOf("data") >= 0 ? lower.indexOf("data") : lower.indexOf("date");
        date = dIdx >= 0 ? (row[dIdx] || todayStr()) : todayStr();
        callType = "import"; soglia = 61; cappotto = false;
        callerId = pids.slice().sort((a, b) => (pm[b] || 0) - (pm[a] || 0))[0];
        callerWon = (pm[callerId] || 0) > 0;
      }
      games.push({ id: uid(), date, pids, callerId, partnerId: null, callType, soglia, cappotto, callerWon, pm });
    });
    return { games, players: np };
  };

  const doImport = () => {
    if (!preview) return;
    const base = importMode === "sostituisci" ? [] : players;
    const { games: ng, players: np } = buildGames(preview.headers, preview.rows, base);
    if (importMode === "sostituisci") {
      loadDb({ ...db, players: np, allGames: ng, giornoGames: ng, raggioDays: [], raggi: [] });
      setMsg("✅ Database sostituito con " + ng.length + " partite.");
    } else {
      setPlayers(np);
      addGames(ng);
      setMsg("✅ Aggiunte " + ng.length + " partite.");
    }
    setPreview(null);
  };

  const exportJson = () => {
    const json = JSON.stringify(db, null, 2);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([json], { type: "application/json" }));
    a.download = "briscolone_" + todayStr().split("/").join("-") + ".json";
    a.click();
  };

  const importJson = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.players || !data.allGames) { setMsg("❌ File JSON non valido."); return; }
        loadDb(data);
        setMsg("✅ Database caricato!");
      } catch { setMsg("❌ Errore nel file JSON."); }
    };
    reader.readAsText(file);
  };

  const exportCsv = () => {
    const games = db.allGames;
    if (!games || !games.length) { setMsg("⚠️ Nessuna partita da esportare."); return; }
    const sortedPlayers = [...players].sort((a, b) => a.name.localeCompare(b.name));
    const headers = ["Data", "Chiamante", "Tipo", "Soglia", "Cappotto", "Esito", ...sortedPlayers.map(p => p.name)];
    const getName = id => { const p = players.find(x => x.id === id); return p ? p.name : ""; };
    const rows = [...games].sort((a, b) => (a.date || "").localeCompare(b.date || "")).map(g => [
      g.date || "", getName(g.callerId), g.callType || "", g.soglia || 61,
      g.cappotto ? "sì" : "no", g.callerWon ? "vince" : "perde",
      ...sortedPlayers.map(p => g.pm ? (g.pm[p.id] !== undefined ? g.pm[p.id] : "") : ""),
    ]);
    const esc = v => { const s = String(v); return (s.includes(",") || s.includes('"')) ? '"' + s.split('"').join('""') + '"' : s; };
    const csv = [headers, ...rows].map(r => r.map(esc).join(",")).join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" }));
    a.download = "briscolone_partite_" + todayStr().split("/").join("-") + ".csv";
    a.click();
  };

  return (
    <div>
      <h2 style={{ color: C.gold, fontFamily: "'Playfair Display',serif", fontSize: 22, marginBottom: 16 }}>📥 Dati</h2>

      <div style={{ ...card, marginBottom: 12 }}>
        <div style={{ color: C.gold, fontWeight: 700, fontSize: 13, marginBottom: 4 }}>💾 Backup JSON</div>
        <div style={{ color: C.muted, fontSize: 12, lineHeight: 1.6, marginBottom: 14 }}>Scarica o carica tutto il database (giocatori, partite, raggi).</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={exportJson} style={{ ...btnP, flex: 1 }}>⬇️ Scarica</button>
          <label style={{ ...btnP, flex: 1, textAlign: "center", cursor: "pointer" }}>
            ⬆️ Carica
            <input type="file" accept=".json" onChange={importJson} style={{ display: "none" }} />
          </label>
        </div>
      </div>

      <div style={{ ...card, marginBottom: 20 }}>
        <div style={{ color: C.gold, fontWeight: 700, fontSize: 13, marginBottom: 4 }}>📊 Esporta CSV</div>
        <div style={{ color: C.muted, fontSize: 12, lineHeight: 1.6, marginBottom: 14 }}>Una riga per partita, una colonna per giocatore. Apribile con Excel o Google Sheets.</div>
        <button onClick={exportCsv} style={{ ...btnP, width: "100%" }}>⬇️ Scarica CSV</button>
      </div>

      <div style={{ borderTop: "1px solid " + C.border, marginBottom: 20 }} />

      <div style={{ ...card, marginBottom: 14 }}>
        <div style={{ color: C.gold, fontWeight: 700, fontSize: 13, marginBottom: 4 }}>📂 Importa da CSV</div>
        <div style={{ color: C.muted, fontSize: 12, lineHeight: 1.6, marginBottom: 14 }}>
          Accetta il CSV esportato da questa app o CSV generici (colonne = giocatori).
        </div>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          {[["aggiungi", "➕ Aggiungi", "Aggiunge al database"], ["sostituisci", "🔄 Sostituisci", "Cancella tutto"]].map(([v, l, sub]) => (
            <button key={v} onClick={() => setImportMode(v)} style={{
              flex: 1, padding: "10px 8px", borderRadius: 8, cursor: "pointer", fontFamily: "inherit",
              background: importMode === v ? (v === "sostituisci" ? C.red + "33" : C.green + "33") : "transparent",
              color: importMode === v ? (v === "sostituisci" ? C.red : C.green) : C.muted,
              border: "1px solid " + (importMode === v ? (v === "sostituisci" ? C.red : C.green) : C.border),
            }}>
              <div style={{ fontWeight: 800, fontSize: 12 }}>{l}</div>
              <div style={{ fontSize: 10, marginTop: 2, opacity: 0.8 }}>{sub}</div>
            </button>
          ))}
        </div>
        <label style={{ display: "block", padding: 20, border: "2px dashed " + C.border, borderRadius: 10, textAlign: "center", cursor: "pointer", color: C.muted, fontSize: 13 }}>
          📎 Seleziona file .csv
          <input type="file" accept=".csv" onChange={handleFile} style={{ display: "none" }} />
        </label>
      </div>

      {preview && (
        <div style={{ ...card, marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ color: C.gold, fontWeight: 700 }}>Anteprima — {preview.rows.length} righe</div>
            <Badge color={preview.isBriscolone ? C.green : C.muted}>{preview.isBriscolone ? "Formato Briscolone ✓" : "Formato generico"}</Badge>
          </div>
          <div style={{ overflowX: "auto", marginBottom: 14 }}>
            <table style={{ borderCollapse: "collapse", fontSize: 11, width: "100%" }}>
              <thead><tr>{preview.headers.map((h, i) => <th key={i} style={{ color: C.gold, padding: "4px 8px", textAlign: "left", borderBottom: "1px solid " + C.border, whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
              <tbody>{preview.rows.slice(0, 3).map((r, i) => <tr key={i}>{preview.headers.map((_, j) => <td key={j} style={{ color: C.text, padding: "4px 8px" }}>{r[j] || ""}</td>)}</tr>)}</tbody>
            </table>
          </div>
          {importMode === "sostituisci" && (
            <div style={{ background: C.red + "18", border: "1px solid " + C.red + "44", borderRadius: 7, padding: "8px 12px", marginBottom: 12, color: C.red, fontSize: 12, fontWeight: 700 }}>
              ⚠️ Questo cancellerà tutto il database!
            </div>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setPreview(null)} style={{ ...btnG(C.muted), flex: 1 }}>Annulla</button>
            <button onClick={doImport} style={{ ...btnP, flex: 2 }}>
              {importMode === "sostituisci" ? "🔄 Sostituisci" : "➕ Aggiungi"} {preview.rows.length} partite
            </button>
          </div>
        </div>
      )}

      {msg && (
        <div style={{ background: msg.startsWith("✅") ? "#091a0a" : "#1a0909", border: "1px solid " + (msg.startsWith("✅") ? C.green : C.red), borderRadius: 8, padding: 14, color: msg.startsWith("✅") ? C.green : C.red, fontWeight: 700 }}>{msg}</div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [players, setPlayers] = useState([]);
  const [allGames, setAllGames] = useState([]);
  const [giornoGames, setGiornoGames] = useState([]);
  const [raggioDays, setRaggioDays] = useState([]);
  const [raggi, setRaggi] = useState([]);
  const [tableIds, setTableIds] = useState([]);
  const [callerId, setCallerId] = useState("");
  const [partnerId, setPartnerId] = useState("");
  const [callType, setCallType] = useState("normale");
  const [soglia, setSoglia] = useState(61);
  const [cappotto, setCappotto] = useState(false);
  const [callerWon, setCallerWon] = useState(null);
  const [gameDate, setGameDate] = useState(todayStr());
  const [page, setPage] = useState("classifiche");
  const [confirmDlg, setConfirmDlg] = useState(null);
  const [infoDlg, setInfoDlg] = useState(null);

  const loadDb = data => {
    setPlayers(data.players || []);
    setAllGames(data.allGames || []);
    setGiornoGames(data.giornoGames || []);
    setRaggioDays(data.raggioDays || []);
    setRaggi(data.raggi || []);
  };

  const { status: fbStatus, save: fbSave } = useFirebase(loadDb);

  const addGame = g => { setAllGames(p => [g, ...p]); setGiornoGames(p => [g, ...p]); };
  const addGames = gs => { setAllGames(p => [...gs, ...p]); setGiornoGames(p => [...gs, ...p]); };
  const deleteGame = id => { setAllGames(p => p.filter(g => g.id !== id)); setGiornoGames(p => p.filter(g => g.id !== id)); };

  const doChiudiGiornata = () => {
    if (giornoGames.length === 0) { setInfoDlg({ title: "Nessuna partita", lines: ["Non ci sono partite oggi."] }); return; }
    const totals = {};
    players.forEach(p => { totals[p.id] = sumPts(p.id, giornoGames); });
    const dateLabel = (giornoGames[0] && giornoGames[0].date) ? giornoGames[0].date : todayStr();
    const newRaggioDays = [...raggioDays.filter(d => d.date !== dateLabel), { date: dateLabel, totals }];
    setRaggioDays(newRaggioDays);
    setGiornoGames([]);
    fbSave({ players, allGames, giornoGames: [], raggioDays: newRaggioDays, raggi });
    setInfoDlg({ title: "☀️ Giornata chiusa!", lines: [
      "Data: " + dateLabel, "─────────────────",
      ...players.filter(p => giornoGames.some(g => g.pids && g.pids.includes(p.id))).map(p => p.name + ": " + (totals[p.id] > 0 ? "+" : "") + totals[p.id] + " pt"),
    ]});
  };

  const chiudiGiornata = () => setConfirmDlg({ title: "Chiudi Giornata", msg: "I totali di oggi verranno aggiunti al raggio e la giornata si azzererà.", onOk: doChiudiGiornata });

  const doChiudiRaggio = () => {
    if (raggioDays.length === 0) { setInfoDlg({ title: "Raggio vuoto", lines: ["Chiudi almeno una giornata prima."] }); return; }
    const scores = players
      .filter(p => raggioDays.some(d => d.totals && d.totals[p.id] !== undefined))
      .map(p => ({ pid: p.id, name: p.name, pts: raggioDays.reduce((a, d) => a + (d.totals ? (d.totals[p.id] || 0) : 0), 0) }));
    const sorted = scores.slice().sort((a, b) => b.pts - a.pts);
    const winner = sorted[0];
    const dates = raggioDays.map(d => d.date).sort();
    const newRaggio = { id: uid(), startDate: dates[0], endDate: dates[dates.length - 1], days: dates.length, scores, winner: winner ? winner.name : null, winnerPts: winner ? winner.pts : 0 };
    const newRaggi = [...raggi, newRaggio];
    setRaggi(newRaggi);
    setRaggioDays([]);
    setGiornoGames([]);
    fbSave({ players, allGames, giornoGames: [], raggioDays: [], raggi: newRaggi });
    setInfoDlg({ title: "🏁 Raggio chiuso!", lines: [
      "Vincitore: " + (winner ? winner.name : "—") + " (" + (winner ? winner.pts : 0) + " pt)",
      "─────────────────",
      ...sorted.map(s => s.name + ": " + (s.pts > 0 ? "+" : "") + s.pts + " pt"),
      "─────────────────", "Nuovo raggio iniziato da zero!",
    ]});
  };

  const chiudiRaggio = () => setConfirmDlg({ title: "Chiudi Raggio", msg: "Il raggio verrà chiuso, il vincitore registrato e si ripartirà da zero.", onOk: doChiudiRaggio });

  const dbData = { players, allGames, giornoGames, raggioDays, raggi };

  const NAV = [
    { id: "classifiche", icon: "🏆", label: "Classifiche" },
    { id: "giocatori",   icon: "👤", label: "Giocatori" },
    { id: "partita",     icon: "🃏", label: "Partita" },
    { id: "storico",     icon: "📜", label: "Storico" },
    { id: "dati",        icon: "📥", label: "Dati" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Crimson Text', Georgia, serif", display: "flex", flexDirection: "column" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        select option { background: #120e08; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #080604; }
        ::-webkit-scrollbar-thumb { background: #2e1f0e; border-radius: 4px; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
        input[type=range] { accent-color: #c8a45a; }
      `}</style>

      <div style={{ background: "linear-gradient(180deg,#1a1000,#080604)", borderBottom: "1px solid " + C.border, padding: "12px 20px", display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 28, color: C.gold }}>♠</span>
        <div>
          <h1 style={{ fontFamily: "'Playfair Display',serif", fontSize: 21, color: C.gold, letterSpacing: 1 }}>Briscolone</h1>
          <div style={{ color: C.muted, fontSize: 9, letterSpacing: 3 }}>SEGNAPUNTI</div>
        </div>
        <div style={{ marginLeft: "auto" }}><FbBadge status={fbStatus} /></div>
      </div>

      <div style={{ flex: 1, padding: "16px 16px 90px", maxWidth: 520, width: "100%", margin: "0 auto", animation: "fadeIn .25s ease" }}>
        {page === "classifiche" && <PageClassifiche players={players} allGames={allGames} raggioDays={raggioDays} giornoGames={giornoGames} raggi={raggi} onChiudiRaggio={chiudiRaggio} />}
        {page === "giocatori"   && <PageGiocatori players={players} setPlayers={setPlayers} allGames={allGames} />}
        {page === "partita"     && <PagePartita players={players} addGame={addGame} tableIds={tableIds} setTableIds={setTableIds} giornoGames={giornoGames} raggioDays={raggioDays} onChiudiGiornata={chiudiGiornata} onChiudiRaggio={chiudiRaggio} callerId={callerId} setCallerId={setCallerId} partnerId={partnerId} setPartnerId={setPartnerId} callType={callType} setCallType={setCallType} soglia={soglia} setSoglia={setSoglia} cappotto={cappotto} setCappotto={setCappotto} callerWon={callerWon} setCallerWon={setCallerWon} date={gameDate} setDate={setGameDate} />}
        {page === "storico"     && <PageStorico allGames={allGames} players={players} deleteGame={deleteGame} />}
        {page === "dati"        && <PageDati players={players} setPlayers={setPlayers} addGames={addGames} db={dbData} loadDb={loadDb} />}
      </div>

      {confirmDlg && <Confirm title={confirmDlg.title} msg={confirmDlg.msg} onOk={() => { const fn = confirmDlg.onOk; setConfirmDlg(null); fn(); }} onCancel={() => setConfirmDlg(null)} />}
      {infoDlg && <Info title={infoDlg.title} lines={infoDlg.lines} onOk={() => setInfoDlg(null)} />}

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0e0b06", borderTop: "1px solid " + C.border, display: "flex", justifyContent: "space-around", padding: "8px 0 14px" }}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setPage(n.id)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "0 4px" }}>
            <span style={{ fontSize: 20, opacity: page === n.id ? 1 : 0.35 }}>{n.icon}</span>
            <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: page === n.id ? C.gold : C.muted }}>{n.label.toUpperCase()}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
