// ── CALCOLATRICE PUNTI ────────────────────────────────────────────────────────
function CalcPopup({ onClose }) {
  const [display, setDisplay] = useState("0");
  const [prev, setPrev] = useState(null);
  const [op, setOp] = useState(null);
  const [fresh, setFresh] = useState(true);
  const [history, setHistory] = useState([]);

  const press = (val) => {
    if (val === "C") {
      setDisplay("0"); setPrev(null); setOp(null); setFresh(true); return;
    }
    if (val === "CE") {
      setDisplay("0"); setFresh(true); return;
    }
    if (val === "±") {
      setDisplay(d => String(parseFloat(d) * -1)); return;
    }
    if (["+","-","×","÷"].includes(val)) {
      setPrev(parseFloat(display));
      setOp(val);
      setFresh(true);
      return;
    }
    if (val === "=") {
      if (op === null || prev === null) return;
      const a = prev, b = parseFloat(display);
      let res;
      if (op==="+") res = a + b;
      else if (op==="-") res = a - b;
      else if (op==="×") res = a * b;
      else if (op==="÷") res = b !== 0 ? a / b : 0;
      const line = a + " " + op + " " + b + " = " + res;
      setHistory(h => [line, ...h].slice(0,5));
      setDisplay(String(parseFloat(res.toFixed(4))));
      setPrev(null); setOp(null); setFresh(true);
      return;
    }
    if (val === ".") {
      if (fresh) { setDisplay("0."); setFresh(false); return; }
      if (display.includes(".")) return;
      setDisplay(d => d + "."); return;
    }
    if (val === "⌫") {
      if (fresh || display.length <= 1) { setDisplay("0"); setFresh(true); return; }
      setDisplay(d => d.length > 1 ? d.slice(0,-1) : "0"); return;
    }
    // numero
    if (fresh) { setDisplay(val); setFresh(false); }
    else setDisplay(d => d === "0" ? val : d.length < 12 ? d + val : d);
  };

  const num = parseFloat(display);
  const ROWS = [
    ["C","CE","⌫","÷"],
    ["7","8","9","×"],
    ["4","5","6","-"],
    ["1","2","3","+"],
    ["±","0",".","="],
  ];

  const btnColor = (v) => {
    if (v === "=")  return { bg:"linear-gradient(135deg,"+C.goldD+","+C.gold+")", col:"#1a0e00", border:C.gold };
    if (["+","-","×","÷"].includes(v)) return { bg:"rgba(201,168,76,.15)", col:C.gold, border:C.gold+"55" };
    if (["C","CE","⌫"].includes(v))   return { bg:"rgba(192,57,43,.15)", col:C.red, border:C.red+"44" };
    return { bg:"rgba(0,0,0,.3)", col:C.cream, border:C.border };
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", zIndex:8000, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={onClose}>
      <div style={{ ...panelGold, width:"100%", maxWidth:400, borderBottomLeftRadius:0, borderBottomRightRadius:0, padding:0, overflow:"hidden" }} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 18px 10px", borderBottom:"1px solid "+C.border }}>
          <span style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:14, letterSpacing:1 }}>🧮 CALCOLATRICE</span>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>

        {/* History */}
        {history.length > 0 && (
          <div style={{ padding:"6px 18px", borderBottom:"1px solid "+C.border+"44" }}>
            {history.map((l,i) => (
              <div key={i} style={{ color:C.muted, fontSize:11, textAlign:"right", opacity:1-(i*0.18) }}>{l}</div>
            ))}
          </div>
        )}

        {/* Display */}
        <div style={{ padding:"10px 18px 6px", textAlign:"right" }}>
          {op && <div style={{ color:C.gold, fontSize:12, opacity:.7, marginBottom:2 }}>{prev} {op}</div>}
          <div style={{ color:num < 0 ? C.red : num > 0 ? C.green : C.cream, fontSize:44, fontWeight:700, fontFamily:"'Lato',sans-serif", lineHeight:1, letterSpacing:-1 }}>
            {display}
          </div>
        </div>

        {/* Tasti */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, padding:"6px 14px 20px" }}>
          {ROWS.flat().map((v,i) => {
            const { bg, col, border } = btnColor(v);
            const isEq = v === "=";
            return (
              <button key={i} onClick={()=>press(v)} style={{
                background:bg, color:col, border:"1px solid "+border,
                borderRadius:10, padding:"16px 0",
                fontSize: isEq ? 20 : 18, fontWeight:700,
                cursor:"pointer", fontFamily:"'Lato',sans-serif",
                boxShadow: isEq ? "0 3px 10px rgba(0,0,0,.4)" : "none",
                active: { transform:"scale(.95)" },
              }}>{v}</button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── PAGE: PARTITA ─────────────────────────────────────────────────────────────
function PagePartita({ players, addGame, tableIds, setTableIds, giornoGames, allGames, raggioCorrenteNome, onChiudiRaggio, callerId, setCallerId, partnerId, setPartnerId, callType, setCallType, soglia, setSoglia, cappotto, setCappotto, callerWon, setCallerWon, date, setDate }) {

  const [showCalc, setShowCalc] = useState(false);
  // step: "tavolo" | "asta"
  const [step, setStep] = useState("tavolo");

  const toggleP = id => setTableIds(prev =>
    prev.includes(id) ? prev.filter(x=>x!==id) : prev.length < 5 ? [...prev,id] : prev
  );

  const selPlayers = players.filter(p => tableIds.includes(p.id));
  const isAlone = callType==="mano" || callType==="carichi";
  const sogliaMult = soglia>=81 ? 3 : soglia>=71 ? 2 : 1;
  const ready = tableIds.length===5;
  const canSave = callerId && callerWon!==null && (isAlone || partnerId);
  const reset = () => { setCallerId(""); setPartnerId(""); setCallType("normale"); setSoglia(61); setCappotto(false); setCallerWon(null); };
  const resetTavolo = () => { setTableIds([]); reset(); setStep("tavolo"); };
  const confermaTavolo = () => { if (ready) setStep("asta"); };

  const save = () => {
    if (!canSave) return;
    const { caller, partner, opponent } = calcPoints(callType, cappotto, soglia, callerWon);
    const pm = {};
    tableIds.forEach(id => {
      pm[id] = id===callerId ? caller : (id===partnerId&&!isAlone) ? partner : opponent;
    });
    addGame({ id:uid(), date, pids:tableIds, callerId, partnerId:isAlone?null:partnerId, callType, soglia, cappotto, callerWon, pm });
    reset();
  };

  const preview = canSave ? calcPoints(callType, cappotto, soglia, callerWon) : null;

  const giornoRows = players
    .filter(p => giornoGames.some(g => g.pids && g.pids.includes(p.id)))
    .map(p => ({ id:p.id, name:p.name, pts:sumPts(p.id, giornoGames) }))
    .sort((a,b) => b.pts-a.pts);

  const raggioGames = allGames.filter(g => g.raggio===raggioCorrenteNome);
  const raggioRows = players
    .filter(p => raggioGames.some(g => g.pids && g.pids.includes(p.id)))
    .map(p => ({ id:p.id, name:p.name, pts:sumPts(p.id, raggioGames) }))
    .sort((a,b) => b.pts-a.pts);

  // Bottone giocatore riutilizzabile (tavolo / chiamante / socio)
  const PlayerBtn = ({ p, selected, onPress, disabled, size }) => {
    const sz = size || 40;
    return (
      <button onClick={onPress} disabled={disabled} style={{
        padding:"8px 4px", borderRadius:10, cursor: disabled ? "default" : "pointer",
        fontFamily:"'Lato',sans-serif",
        opacity: disabled ? 0.2 : 1,
        background: selected ? "linear-gradient(160deg,"+C.goldD+","+C.gold+"88)" : "rgba(0,0,0,.3)",
        border:"2px solid " + (selected ? C.gold : C.border),
        boxShadow: selected ? "0 0 12px rgba(201,168,76,.35)" : "none",
        display:"flex", flexDirection:"column", alignItems:"center", gap:4,
        transition:"all .15s",
        width:"100%", height:90, justifyContent:"center", overflow:"hidden",
      }}>
        <div style={{ width:sz, height:sz, borderRadius:"50%", overflow:"hidden", border:"2px solid "+(selected?C.gold:C.border+"88"), display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,.3)", fontSize:p.photoUrl?"inherit":p.emoji?22:16, fontWeight:900, color:"#fff", flexShrink:0 }}>
          {p.photoUrl
            ? <img src={p.photoUrl} alt={p.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} onError={e=>{e.target.style.display="none";}} />
            : (p.emoji || p.name[0].toUpperCase())}
        </div>
        <div style={{ textAlign:"center", lineHeight:1.2, width:"100%", padding:"0 2px" }}>
          <div style={{ color:selected?"#1a0e00":C.cream, fontWeight:700, fontSize:10, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</div>
          {p.nickname ? <div style={{ color:selected?"#3a2000":C.muted, fontSize:9, marginTop:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>"{p.nickname}"</div> : null}
        </div>
      </button>
    );
  };

  return (
    <div className="page">
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
        <span style={{ fontSize:26 }}>🃏</span>
        <h2 style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:19, letterSpacing:2 }}>PARTITA</h2>
      </div>

      {/* Scoreboard oggi/raggio */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
        <div style={{ ...panel, padding:12 }}>
          <div style={{ color:C.gold, fontWeight:700, fontSize:10, letterSpacing:2, marginBottom:8 }}>☀️ OGGI ({giornoGames.length})</div>
          {giornoRows.length===0
            ? <div style={{ color:C.muted, fontSize:11, padding:"6px 0", textAlign:"center" }}>—</div>
            : giornoRows.map((r,i) => (
              <div key={r.id} style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:3 }}>
                <span style={{ color:i===0?C.goldL:C.cream }}>{r.name}</span>
                <Pts v={r.pts} size={12} />
              </div>
            ))}
        </div>
        <div style={{ ...panel, padding:12 }}>
          <div style={{ color:"#c39bd3", fontWeight:700, fontSize:10, letterSpacing:1, marginBottom:8 }}>⚡ {raggioCorrenteNome}</div>
          {raggioRows.length===0
            ? <div style={{ color:C.muted, fontSize:11, padding:"6px 0", textAlign:"center" }}>—</div>
            : raggioRows.map((r,i) => (
              <div key={r.id} style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:3 }}>
                <span style={{ color:i===0?C.goldL:C.cream }}>{r.name}</span>
                <span style={{ fontWeight:700, fontSize:12, color:r.pts>=15?C.green:r.pts>0?C.gold:r.pts<0?C.red:C.muted }}>{r.pts}/15</span>
              </div>
            ))}
          <button onClick={onChiudiRaggio} style={{ ...btnG("#c39bd3"), marginTop:8, fontSize:10, padding:"6px 10px" }}>🏁 Chiudi</button>
        </div>
      </div>

      {/* ── STEP TAVOLO ── */}
      {step==="tavolo" && (
        <div style={{ ...panel, marginBottom:12 }}>
          <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:13, letterSpacing:1, marginBottom:12 }}>
            TAVOLO — {tableIds.length}/5 giocatori
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8, marginBottom:16 }}>
            {players.map(p => (
              <PlayerBtn key={p.id} p={p} selected={tableIds.includes(p.id)} onPress={()=>toggleP(p.id)} disabled={!tableIds.includes(p.id) && tableIds.length===5} />
            ))}
          </div>
          <button onClick={confermaTavolo} disabled={!ready} style={{ ...btnP, width:"100%", padding:14, fontSize:13, opacity:ready?1:.35 }}>
            ✅ CONFERMA TAVOLO
          </button>
        </div>
      )}

      {/* ── STEP ASTA E CHIAMATA ── */}
      {step==="asta" && (
        <div>
          <div style={{ ...panel, marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, letterSpacing:1, fontSize:13 }}>ASTA E CHIAMATA</div>
              <button onClick={()=>setStep("tavolo")} style={{ ...btnG(C.muted), width:"auto", padding:"5px 12px", fontSize:11 }}>✏️ Modifica tavolo</button>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

              {/* Data */}
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <span style={{ color:C.muted, fontSize:11, flexShrink:0, letterSpacing:.5 }}>DATA</span>
                <input value={date} onChange={e=>setDate(e.target.value)} style={{ ...inp, width:130 }} />
              </div>

              {/* Chi ha chiamato */}
              <div>
                <div style={{ color:C.muted, fontSize:11, letterSpacing:1, marginBottom:8 }}>CHI HA CHIAMATO?</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
                  {selPlayers.map(p => (
                    <PlayerBtn key={p.id} p={p} selected={callerId===p.id} onPress={()=>{ setCallerId(p.id); if (partnerId===p.id) setPartnerId(""); }} />
                  ))}
                </div>
              </div>

              {/* Tipo chiamata */}
              <div>
                <div style={{ color:C.muted, fontSize:11, letterSpacing:1, marginBottom:6 }}>TIPO CHIAMATA</div>
                <div style={{ display:"flex", gap:7 }}>
                  {[["normale","Normale"],["mano","In Mano"],["carichi","Carichi"]].map(([v,l]) => (
                    <button key={v} onClick={() => setCallType(v)} style={{
                      flex:1, padding:"10px 0", borderRadius:7, cursor:"pointer", fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif", letterSpacing:.5,
                      background:callType===v ? "linear-gradient(135deg,"+C.goldD+","+C.gold+")" : "rgba(0,0,0,.3)",
                      color:callType===v ? "#1a0e00" : C.muted,
                      border:"1px solid " + (callType===v ? C.gold : C.border),
                    }}>{l}</button>
                  ))}
                </div>
              </div>

              {/* Socio */}
              {!isAlone && callerId && (
                <div>
                  <div style={{ color:C.muted, fontSize:11, letterSpacing:1, marginBottom:8 }}>SOCIO SEGRETO</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
                    {selPlayers.map(p => (
                      <PlayerBtn key={p.id} p={p} selected={partnerId===p.id} onPress={()=>setPartnerId(p.id)} disabled={p.id===callerId} />
                    ))}
                  </div>
                </div>
              )}

              {/* Moltiplicatore */}
              <div>
                <div style={{ color:C.muted, fontSize:11, letterSpacing:1, marginBottom:8 }}>MOLTIPLICATORE</div>
                <div style={{ display:"flex", gap:8 }}>
                  {[[1,"✕1"],[2,"✕2"],[3,"✕3"]].map(([v,l]) => (
                    <button key={v} onClick={()=>setSoglia(v===1?61:v===2?71:81)} style={{
                      flex:1, padding:"10px 0", borderRadius:7, cursor:"pointer", fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif", letterSpacing:.5,
                      background:sogliaMult===v ? "linear-gradient(135deg,"+C.goldD+","+C.gold+")" : "rgba(0,0,0,.3)",
                      color:sogliaMult===v ? "#1a0e00" : C.muted,
                      border:"1px solid " + (sogliaMult===v ? C.gold : C.border),
                    }}>{l}</button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* ── RISULTATO ── */}
          {callerId && (isAlone || partnerId) && (
            <div style={{ ...panel, marginBottom:12 }}>
              <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, marginBottom:14, letterSpacing:1, fontSize:13 }}>RISULTATO</div>

              <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                <button onClick={() => setCappotto(!cappotto)} style={{
                  flex:1, padding:"12px 10px", borderRadius:8, cursor:"pointer", fontWeight:700, fontFamily:"'Lato',sans-serif", letterSpacing:.5,
                  background:cappotto ? C.purple+"2a" : "rgba(0,0,0,.3)",
                  color:cappotto ? "#c39bd3" : C.muted,
                  border:"2px solid " + (cappotto ? C.purple : C.border),
                  boxShadow:cappotto ? "0 0 10px "+C.purple+"44" : "none",
                }}>🎩 Cappotto{cappotto ? " ×2" : ""}</button>
                <button onClick={()=>setShowCalc(true)} style={{
                  padding:"0 18px", borderRadius:8, cursor:"pointer", fontSize:22,
                  background:"rgba(0,0,0,.3)", border:"2px solid "+C.border, flexShrink:0,
                }} title="Calcolatrice">🧮</button>
              </div>

              {preview && (
                <div style={{ background:"rgba(0,0,0,.35)", borderRadius:8, padding:14, marginBottom:14, border:"1px solid "+C.border }}>
                  {tableIds.map(id => {
                    const p = players.find(x => x.id===id);
                    const pt = id===callerId ? preview.caller : (id===partnerId&&!isAlone) ? preview.partner : preview.opponent;
                    const role = id===callerId ? "chiamante" : (id===partnerId&&!isAlone) ? "socio" : "avversario";
                    return (
                      <div key={id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 0", borderBottom:"1px solid "+C.border+"44" }}>
                        <span style={{ color:C.cream, fontSize:13 }}>{p?p.name:"?"} <span style={{ color:C.muted, fontSize:11 }}>({role})</span></span>
                        <Pts v={pt} />
                      </div>
                    );
                  })}
                  <div style={{ marginTop:8, color:C.muted, fontSize:11, textAlign:"right" }}>
                    Moltiplicatore: <strong style={{ color:C.gold }}>{sogliaMult*(cappotto?2:1)}×</strong>
                  </div>
                </div>
              )}

              {/* Vince / Perde */}
              <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                {[[true,"✅ VINCE",C.green],[false,"❌ PERDE",C.red]].map(([v,l,col]) => (
                  <button key={String(v)} onClick={() => setCallerWon(v)} style={{
                    flex:1, padding:14, borderRadius:8, cursor:"pointer", fontWeight:800, fontSize:12, fontFamily:"'Lato',sans-serif", letterSpacing:1,
                    background:callerWon===v ? col+"2a" : "rgba(0,0,0,.3)",
                    color:callerWon===v ? col : C.muted,
                    border:"2px solid " + (callerWon===v ? col : C.border),
                    boxShadow:callerWon===v ? "0 0 12px "+col+"44" : "none",
                  }}>{l}</button>
                ))}
              </div>

              <button onClick={save} disabled={!canSave} style={{ ...btnP, width:"100%", padding:15, fontSize:14, opacity:canSave?1:.4 }}>
                💾 SALVA PARTITA
              </button>
            </div>
          )}
        </div>
      )}

      {showCalc && <CalcPopup onClose={()=>setShowCalc(false)} />}
    </div>
  );
}



// ── EDIT GAME MODAL ───────────────────────────────────────────────────────────
function EditGameModal({ editId, editForm, setEditFormSt, allGames, players, closeEdit, saveEdit }) {
  const g = allGames.find(x => x.id===editId);
  if (!g || !editForm) return null;
  const isAloneE = editForm.callType==="mano" || editForm.callType==="carichi";
  const sogliaMultE = editForm.soglia>=81 ? 3 : editForm.soglia>=71 ? 2 : 1;

  const miniAvatar = (p, selected) => (
    <button key={p.id} onClick={()=>setEditFormSt(f=>({...f, callerId:p.id, partnerId:f.partnerId===p.id?"":f.partnerId}))} style={{ padding:"8px 4px", borderRadius:8, cursor:"pointer", fontFamily:"'Lato',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", gap:4, background:selected?"linear-gradient(135deg,"+C.goldD+","+C.gold+"88)":"rgba(0,0,0,.3)", border:"2px solid "+(selected?C.gold:C.border) }}>
      <div style={{ width:32, height:32, borderRadius:"50%", background:"rgba(0,0,0,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:p.emoji?16:12, color:"#fff", border:"1px solid "+(selected?C.gold:C.border+"88"), overflow:"hidden" }}>
        {p.photoUrl ? <img src={p.photoUrl} style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : (p.emoji||p.name[0])}
      </div>
      <div style={{ color:selected?C.btnPCol:C.cream, fontSize:9, fontWeight:700, textAlign:"center", wordBreak:"break-word" }}>{p.name}</div>
    </button>
  );

  const dateParts = (editForm.date||"01/01/2024").split("/");
  const dateVal = dateParts.length===3 ? dateParts[2]+"-"+dateParts[1]+"-"+dateParts[0] : "";

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.8)", zIndex:8000, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={closeEdit}>
      <div style={{ ...panelGold, width:"100%", maxWidth:440, borderBottomLeftRadius:0, borderBottomRightRadius:0, maxHeight:"90vh", overflowY:"auto" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <span style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:14, letterSpacing:1 }}>✏️ MODIFICA PARTITA</span>
          <button onClick={closeEdit} style={{ background:"none", border:"none", color:C.muted, fontSize:22, cursor:"pointer" }}>✕</button>
        </div>

        {/* Data */}
        <div style={{ marginBottom:14 }}>
          <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>DATA</div>
          <input type="date" value={dateVal} onChange={e=>{ const p=e.target.value.split("-"); setEditFormSt(f=>({...f, date:p[2]+"/"+p[1]+"/"+p[0]})); }} style={{ ...inp, colorScheme:"dark" }} />
        </div>

        {/* Chiamante */}
        <div style={{ marginBottom:14 }}>
          <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:8 }}>CHIAMANTE</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 }}>
            {(g.pids||[]).map(id => { const p=players.find(x=>x.id===id); if (!p) return null;
              return miniAvatar(p, editForm.callerId===id);
            })}
          </div>
        </div>

        {/* Tipo chiamata */}
        <div style={{ marginBottom:14 }}>
          <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>TIPO CHIAMATA</div>
          <div style={{ display:"flex", gap:7 }}>
            {[["normale","Normale"],["mano","In Mano"],["carichi","Carichi"]].map(([v,l]) => (
              <button key={v} onClick={()=>setEditFormSt(f=>({...f, callType:v}))} style={{ flex:1, padding:"10px 0", borderRadius:7, cursor:"pointer", fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif", letterSpacing:.5, background:editForm.callType===v?"linear-gradient(135deg,"+C.goldD+","+C.gold+")":"rgba(0,0,0,.3)", color:editForm.callType===v?C.btnPCol:C.muted, border:"1px solid "+(editForm.callType===v?C.gold:C.border) }}>{l}</button>
            ))}
          </div>
        </div>

        {/* Socio */}
        {!isAloneE && editForm.callerId && (
          <div style={{ marginBottom:14 }}>
            <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:8 }}>SOCIO</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 }}>
              {(g.pids||[]).map(id => { const p=players.find(x=>x.id===id); if (!p) return null;
                const dis = id===editForm.callerId;
                return (
                  <button key={id} onClick={()=>!dis&&setEditFormSt(f=>({...f,partnerId:id}))} style={{ padding:"8px 4px", borderRadius:8, cursor:dis?"default":"pointer", fontFamily:"'Lato',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", gap:4, opacity:dis?.25:1, background:editForm.partnerId===id?"linear-gradient(135deg,"+C.goldD+","+C.gold+"88)":"rgba(0,0,0,.3)", border:"2px solid "+(editForm.partnerId===id?C.gold:C.border) }}>
                    <div style={{ width:32, height:32, borderRadius:"50%", background:"rgba(0,0,0,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:p.emoji?16:12, color:"#fff", overflow:"hidden" }}>
                      {p.photoUrl?<img src={p.photoUrl} style={{ width:"100%", height:"100%", objectFit:"cover" }} />:(p.emoji||p.name[0])}
                    </div>
                    <div style={{ color:editForm.partnerId===id?C.btnPCol:C.cream, fontSize:9, fontWeight:700, textAlign:"center", wordBreak:"break-word" }}>{p.name}</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Moltiplicatore */}
        <div style={{ marginBottom:14 }}>
          <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>MOLTIPLICATORE</div>
          <div style={{ display:"flex", gap:7 }}>
            {[[1,"✕1"],[2,"✕2"],[3,"✕3"]].map(([v,l]) => (
              <button key={v} onClick={()=>setEditFormSt(f=>({...f, soglia:v===1?61:v===2?71:81}))} style={{ flex:1, padding:"10px 0", borderRadius:7, cursor:"pointer", fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif", letterSpacing:.5, background:sogliaMultE===v?"linear-gradient(135deg,"+C.goldD+","+C.gold+")":"rgba(0,0,0,.3)", color:sogliaMultE===v?C.btnPCol:C.muted, border:"1px solid "+(sogliaMultE===v?C.gold:C.border) }}>{l}</button>
            ))}
          </div>
        </div>

        {/* Cappotto + Esito */}
        <div style={{ display:"flex", gap:8, marginBottom:18 }}>
          <button onClick={()=>setEditFormSt(f=>({...f,cappotto:!f.cappotto}))} style={{ flex:1, padding:"11px 0", borderRadius:7, cursor:"pointer", fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif", background:editForm.cappotto?C.purple+"2a":"rgba(0,0,0,.3)", color:editForm.cappotto?"#c39bd3":C.muted, border:"1px solid "+(editForm.cappotto?C.purple:C.border) }}>🎩 Cappotto</button>
          {[[true,"✅ Vince",C.green],[false,"❌ Perde",C.red]].map(([v,l,col]) => (
            <button key={String(v)} onClick={()=>setEditFormSt(f=>({...f,callerWon:v}))} style={{ flex:1, padding:"11px 0", borderRadius:7, cursor:"pointer", fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif", background:editForm.callerWon===v?col+"2a":"rgba(0,0,0,.3)", color:editForm.callerWon===v?col:C.muted, border:"1px solid "+(editForm.callerWon===v?col:C.border) }}>{l}</button>
          ))}
        </div>

        <button onClick={()=>saveEdit(g)} style={{ ...btnP, width:"100%", padding:14 }}>💾 SALVA MODIFICHE</button>
      </div>
    </div>
  );
}

// ── PAGE: STORICO ─────────────────────────────────────────────────────────────
function PageStorico({ allGames, players, deleteGame, updateGame }) {
  const getName = id => { const p = players.find(x=>x.id===id); return p?p.name:"?"; };

  const [showFilters, setShowFilters] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editForm, setEditFormSt] = useState(null);
  const openEdit = g => { setEditId(g.id); setEditFormSt({ callerId:g.callerId, partnerId:g.partnerId||"", callType:g.callType, soglia:g.soglia||61, cappotto:!!g.cappotto, callerWon:!!g.callerWon, date:g.date||"" }); };
  const closeEdit = () => { setEditId(null); setEditFormSt(null); };
  const saveEdit = g => {
    if (!editForm) return;
    const ef = editForm;
    const isAloneE = ef.callType==="mano"||ef.callType==="carichi";
    const pts = calcPoints(ef.callType, ef.cappotto, ef.soglia, ef.callerWon);
    const pm = {};
    (g.pids||[]).forEach(id => {
      pm[id] = id===ef.callerId ? pts.caller : (id===ef.partnerId&&!isAloneE) ? pts.partner : pts.opponent;
    });
    updateGame(g.id, { callerId:ef.callerId, partnerId:isAloneE?null:ef.partnerId, callType:ef.callType, soglia:ef.soglia, cappotto:ef.cappotto, callerWon:ef.callerWon, date:ef.date, pm });
    closeEdit();
  };
  const [filterRaggio, setFilterRaggio] = useState("");
  const [filterPlayers, setFilterPlayers] = useState([]);
  const [filterDateFrom, setFilterDateFrom] = useState("");
  const [filterDateTo, setFilterDateTo] = useState("");
  const [filterEsito, setFilterEsito] = useState("");
  const [filterTipo, setFilterTipo] = useState("");
  const [filterMolt, setFilterMolt] = useState("");
  const [sortBy, setSortBy] = useState("data_desc");

  // Valori unici per filtri
  const raggiList = [...new Set(allGames.map(g=>g.raggio||"").filter(Boolean))].sort();

  const toggleFilterPlayer = id => setFilterPlayers(prev =>
    prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]
  );

  const resetFilters = () => {
    setFilterRaggio(""); setFilterPlayers([]); setFilterDateFrom("");
    setFilterDateTo(""); setFilterEsito(""); setFilterTipo(""); setFilterMolt("");
  };

  const hasFilters = filterRaggio||filterPlayers.length||filterDateFrom||filterDateTo||filterEsito||filterTipo||filterMolt;

  // Converti data it-IT (gg/mm/aaaa) in stringa comparabile
  const parseDate = d => {
    if (!d) return "";
    const parts = d.split("/");
    // Stored as dd/mm/yyyy → convert to yyyy-mm-dd for comparison
    return parts.length===3 ? parts[2]+"-"+parts[1]+"-"+parts[0] : d;
  };
  // filterDateFrom/To are already yyyy-mm-dd from date input, so compare directly
  const gameDate = g => parseDate(g.date);

  const filtered = allGames.filter(g => {
    if (filterRaggio && g.raggio !== filterRaggio) return false;
    if (filterPlayers.length && !filterPlayers.every(id => g.pids && g.pids.includes(id))) return false;
    if (filterDateFrom && gameDate(g) < filterDateFrom) return false;
    if (filterDateTo && gameDate(g) > filterDateTo) return false;
    if (filterEsito === "vince" && !g.callerWon) return false;
    if (filterEsito === "perde" && g.callerWon) return false;
    if (filterTipo && g.callType !== filterTipo) return false;
    if (filterMolt === "x1" && (g.soglia>=71||g.cappotto)) return false;
    if (filterMolt === "x2" && !(g.soglia>=71&&g.soglia<81&&!g.cappotto)) return false;
    if (filterMolt === "x3" && !(g.soglia>=81&&!g.cappotto)) return false;
    if (filterMolt === "cappotto" && !g.cappotto) return false;
    return true;
  }).sort((a,b) => {
    if (sortBy==="data_desc") return gameDate(b).localeCompare(gameDate(a));
    if (sortBy==="data_asc")  return gameDate(a).localeCompare(gameDate(b));
    return 0;
  });

  const chipBtn = (active, onClick, label, color) => (
    <button onClick={onClick} style={{
      padding:"5px 11px", borderRadius:20, cursor:"pointer", whiteSpace:"nowrap",
      fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif",
      background: active ? (color||C.gold)+"22" : "rgba(0,0,0,.3)",
      color: active ? (color||C.gold) : C.muted,
      border:"1px solid " + (active ? (color||C.gold) : C.border),
    }}>{label}</button>
  );

  return (
    <div className="page">
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
        <span style={{ fontSize:26 }}>📜</span>
        <h2 style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:19, letterSpacing:2 }}>STORICO</h2>
        <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ color:C.muted, fontSize:12 }}>{filtered.length}/{allGames.length}</span>
          <button onClick={()=>setShowFilters(v=>!v)} style={{
            padding:"6px 12px", borderRadius:20, cursor:"pointer",
            fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif",
            background: (showFilters||hasFilters) ? C.gold+"22" : "rgba(0,0,0,.3)",
            color: (showFilters||hasFilters) ? C.gold : C.muted,
            border:"1px solid " + ((showFilters||hasFilters) ? C.gold : C.border),
          }}>🔍 Filtri{hasFilters ? " ●" : ""}</button>
        </div>
      </div>

      {showFilters && (
        <div style={{ ...panel, marginBottom:14, border: hasFilters ? "1px solid "+C.gold+"55" : "1px solid "+C.border }}>

          {/* Raggio */}
          <div style={{ marginBottom:12 }}>
            <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>RAGGIO</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {chipBtn(!filterRaggio, ()=>setFilterRaggio(""), "Tutti")}
              {raggiList.map(r => chipBtn(filterRaggio===r, ()=>setFilterRaggio(filterRaggio===r?"":r), r))}
            </div>
          </div>

          {/* Giocatori */}
          <div style={{ marginBottom:12 }}>
            <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>GIOCATORI (devono essere tutti presenti)</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {players.map(p => chipBtn(filterPlayers.includes(p.id), ()=>toggleFilterPlayer(p.id), p.name))}
            </div>
          </div>

          {/* Date */}
          <div style={{ marginBottom:12 }}>
            <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>PERIODO</div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={{ ...inp, flex:1, fontSize:12, colorScheme:"dark" }} />
              <span style={{ color:C.muted }}>→</span>
              <input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={{ ...inp, flex:1, fontSize:12, colorScheme:"dark" }} />
            </div>
          </div>

          {/* Esito */}
          <div style={{ marginBottom:12 }}>
            <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>ESITO CHIAMANTE</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {chipBtn(!filterEsito, ()=>setFilterEsito(""), "Tutti")}
              {chipBtn(filterEsito==="vince", ()=>setFilterEsito(filterEsito==="vince"?"":"vince"), "✅ Vince", C.green)}
              {chipBtn(filterEsito==="perde", ()=>setFilterEsito(filterEsito==="perde"?"":"perde"), "❌ Perde", C.red)}
            </div>
          </div>

          {/* Tipo chiamata */}
          <div style={{ marginBottom:12 }}>
            <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>TIPO CHIAMATA</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {chipBtn(!filterTipo, ()=>setFilterTipo(""), "Tutti")}
              {["normale","mano","carichi","import"].map(t => chipBtn(filterTipo===t, ()=>setFilterTipo(filterTipo===t?"":t), t))}
            </div>
          </div>

          {/* Moltiplicatore */}
          <div style={{ marginBottom:14 }}>
            <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:6 }}>MOLTIPLICATORE</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {chipBtn(!filterMolt, ()=>setFilterMolt(""), "Tutti")}
              {chipBtn(filterMolt==="x1", ()=>setFilterMolt(filterMolt==="x1"?"":"x1"), "×1")}
              {chipBtn(filterMolt==="x2", ()=>setFilterMolt(filterMolt==="x2"?"":"x2"), "×2", "#d4870a")}
              {chipBtn(filterMolt==="x3", ()=>setFilterMolt(filterMolt==="x3"?"":"x3"), "×3", C.red)}
              {chipBtn(filterMolt==="cappotto", ()=>setFilterMolt(filterMolt==="cappotto"?"":"cappotto"), "🎩 Cappotto", C.purple)}
            </div>
          </div>

          {/* Ordina + Reset */}
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{ ...inp, flex:1, fontSize:12 }}>
              <option value="data_desc">📅 Più recenti prima</option>
              <option value="data_asc">📅 Più vecchie prima</option>
            </select>
            {hasFilters && <button onClick={resetFilters} style={{ ...btnD, whiteSpace:"nowrap" }}>✕ Reset</button>}
          </div>
        </div>
      )}

      {filtered.length===0 && (
        <div style={{ textAlign:"center", padding:40, color:C.muted }}>
          <div style={{ fontSize:36, marginBottom:8, opacity:.4 }}>🔍</div>
          {allGames.length===0 ? "Nessuna partita ancora." : "Nessuna partita corrisponde ai filtri."}
        </div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {filtered.map(g => (
          <div key={g.id} style={panel}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
              <div>
                <div style={{ color:C.muted, fontSize:11, marginBottom:6, letterSpacing:.3 }}>
                  {g.date}{g.raggio ? " · "+g.raggio : ""}
                </div>
                <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                  {g.callType!=="normale" && g.callType!=="import" && <Badge color="#d4870a">{g.callType}</Badge>}
                  {g.soglia>=71 && <Badge color={g.soglia>=81?C.red:"#d4870a"}>{g.soglia>=81?"×3":"×2"}</Badge>}
                  {g.cappotto && <Badge color={C.purple}>Cappotto</Badge>}
                  <Badge color={g.callerWon?C.green:C.red}>{g.callerWon?"VINCE":"PERDE"}</Badge>
                </div>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={()=>openEdit(g)} style={{ ...btnD, color:C.gold, border:"1px solid "+C.gold+"66" }}>✏️</button>
                <button onClick={() => deleteGame(g.id)} style={btnD}>✕</button>
              </div>
            </div>
            {(g.pids||[]).map(id => {
              const role = id===g.callerId?"📣":id===g.partnerId?"🤝":"⚔️";
              return (
                <div key={id} style={{ display:"flex", justifyContent:"space-between", fontSize:13, padding:"3px 0", borderBottom:"1px solid "+C.border+"44" }}>
                  <span style={{ color:C.cream }}>{role} {getName(id)}</span>
                  <Pts v={g.pm?(g.pm[id]||0):0} />
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {editId && editForm && <EditGameModal editId={editId} editForm={editForm} setEditFormSt={setEditFormSt} allGames={allGames} players={players} closeEdit={closeEdit} saveEdit={saveEdit} />}
    </div>
  );
}

// ── PAGE: DATI ────────────────────────────────────────────────────────────────
function PageDati({ players, setPlayers, addGames, db, loadDb, allGames, raggi, onForceSave, fbStatus }) {
  const [unlocked, setUnlocked] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [msg, setMsg] = useState("");
  const [preview, setPreview] = useState(null);
  const [importMode, setImportMode] = useState("aggiungi");
  const [editRaggi, setEditRaggi] = useState(false);
  const [raggiEdits, setRaggiEdits] = useState({});
  const [raggiNomeEdits, setRaggiNomeEdits] = useState({});

  const checkPw = () => {
    if (pwInput === "9876") { setUnlocked(true); setPwError(false); }
    else { setPwError(true); setPwInput(""); }
  };

  if (!unlocked) return (
    <div className="page">
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
        <span style={{ fontSize:26 }}>📥</span>
        <h2 style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:19, letterSpacing:2 }}>DATI</h2>
      </div>
      <div style={{ ...panelGold, maxWidth:300, margin:"60px auto 0", textAlign:"center", padding:28 }}>
        <div style={{ fontSize:44, marginBottom:14 }}>🔒</div>
        <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:15, marginBottom:6 }}>AREA PROTETTA</div>
        <div style={{ color:C.muted, fontSize:12, marginBottom:20 }}>Inserisci la password per accedere</div>
        <input
          type="password"
          value={pwInput}
          onChange={e => { setPwInput(e.target.value); setPwError(false); }}
          onKeyDown={e => e.key==="Enter" && checkPw()}
          placeholder="Password..."
          style={{ ...inp, textAlign:"center", fontSize:18, letterSpacing:4, marginBottom:10 }}
          autoFocus
        />
        {pwError && <div style={{ color:C.red, fontSize:12, marginBottom:10, fontWeight:700 }}>❌ Password errata</div>}
        <button onClick={checkPw} style={{ ...btnP, width:"100%", marginTop:4 }}>🔓 ACCEDI</button>
      </div>
    </div>
  );

  const FIXED = ["raggio","data","chiamante","socio","tipo","soglia","cappotto","esito"];

  const isBrisco = headers => {
    const lower = headers.map(h => h.toLowerCase());
    return ["data","chiamante","tipo","soglia","cappotto","esito"].every(c => lower.includes(c));
  };

  const parseCSV = text => {
    const clean = text.charCodeAt(0)===0xFEFF ? text.slice(1) : text;
    return clean.split("\n").filter(l => l.replace("\r","").trim().length > 0).map(line => {
      const row = []; let cur="", inQ=false;
      for (let i=0; i<line.length; i++) {
        const ch=line[i];
        if (ch==='"') { inQ=!inQ; }
        else if (ch==="," && !inQ) { row.push(cur.trim()); cur=""; }
        else if (ch!=="\r") cur+=ch;
      }
      row.push(cur.trim());
      return row;
    });
  };

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const name = file.name.toLowerCase();
    const reader = new FileReader();
    if (name.endsWith(".csv")) {
      reader.onload = ev => {
        const rows = parseCSV(ev.target.result);
        if (rows.length < 2) { setMsg("File vuoto."); return; }
        setPreview({ headers:rows[0].map(h=>String(h)), rows:rows.slice(1).filter(r=>r.some(c=>c!=="")), isBriscolone:isBrisco(rows[0]) });
        setMsg("");
      };
      reader.readAsText(file, "UTF-8");
    } else {
      reader.onload = ev => {
        try {
          const data = new Uint8Array(ev.target.result);
          const wb = XLSX.read(data, { type:"array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
          if (!rows||rows.length < 2) { setMsg("File vuoto o non valido."); return; }
          const headers = rows[0].map(h => String(h));
          const dataRows = rows.slice(1).filter(r => r.some(c => c !== ""));
          setPreview({ headers, rows:dataRows, isBriscolone:isBrisco(headers) });
          setMsg("");
        } catch(err) { setMsg("Errore nel file: "+err.message); }
      };
      reader.readAsArrayBuffer(file);
    }
    e.target.value="";
  };

  const buildGames = (headers, rows, basePlayers) => {
    const lower = headers.map(h => h.toLowerCase());
    const ci = n => lower.indexOf(n);
    const isB = isBrisco(headers);
    const usedCols = headers.map((h,i)=>({name:h,i})).filter(c => !FIXED.includes(c.name.toLowerCase()) && c.name.trim());

    let np = [...basePlayers];
    usedCols.forEach(({name}) => {
      if (!np.find(p => p.name.toLowerCase()===name.toLowerCase())) np.push({id:uid(),name});
    });

    const games = [];
    rows.forEach(row => {
      const pids=[], pm={};
      let partnerId=null, raggio="";
      usedCols.forEach(({name,i}) => {
        const v=row[i]; if (v===""||v===undefined) return;
        const pt=Number(v); if (isNaN(pt)) return;
        const p=np.find(x=>x.name.toLowerCase()===name.toLowerCase()); if (!p) return;
        pids.push(p.id); pm[p.id]=pt;
      });
      if (pids.length < 2) return;
      let date, callType, soglia, cappotto, callerWon, callerId;
      if (isB) {
        raggio    = row[ci("raggio")] || "";
        date      = row[ci("data")] || todayStr();
        callType  = row[ci("tipo")] || "import";
        soglia    = Number(row[ci("soglia")]) || 61;
        cappotto  = (row[ci("cappotto")]||"").toLowerCase()==="sì";
        callerWon = (row[ci("esito")]||"").toLowerCase()==="vince";
        const cp  = np.find(p=>p.name.toLowerCase()===(row[ci("chiamante")]||"").toLowerCase());
        callerId  = cp ? cp.id : pids.slice().sort((a,b)=>(pm[b]||0)-(pm[a]||0))[0];
        const sp  = np.find(p=>p.name.toLowerCase()===(row[ci("socio")]||"").toLowerCase());
        if (sp) partnerId = sp.id;
      } else {
        const dIdx = lower.indexOf("data")>=0 ? lower.indexOf("data") : lower.indexOf("date");
        date = dIdx>=0 ? (row[dIdx]||todayStr()) : todayStr();
        callType="import"; soglia=61; cappotto=false;
        callerId = pids.slice().sort((a,b)=>(pm[b]||0)-(pm[a]||0))[0];
        callerWon = (pm[callerId]||0) > 0;
      }
      games.push({id:uid(), date, pids, callerId, partnerId, callType, soglia, cappotto, callerWon, pm, raggio});
    });
    return {games, players:np};
  };

  const doImport = () => {
    if (!preview) return;
    const base = importMode==="sostituisci" ? [] : players;
    const {games:ng, players:np} = buildGames(preview.headers, preview.rows, base);
    // Preserva sempre nickname, emoji, photoUrl, storici dai giocatori esistenti
    const merged = np.map(newP => {
      const existing = players.find(p => p.name.toLowerCase()===newP.name.toLowerCase());
      if (!existing) return newP;
      return {
        ...newP,
        nickname:    existing.nickname    || newP.nickname    || "",
        emoji:       existing.emoji       || newP.emoji       || "",
        photoUrl:    existing.photoUrl    || newP.photoUrl    || "",
        storiciPunti: existing.storiciPunti != null ? existing.storiciPunti : (newP.storiciPunti || 0),
        storiciRaggi: existing.storiciRaggi != null ? existing.storiciRaggi : (newP.storiciRaggi || 0),
      };
    });
    if (importMode==="sostituisci") {
      loadDb({...db, players:merged, allGames:ng, giornoGames:ng, raggioDays:[], raggi:[]});
      setMsg("✅ Database sostituito con "+ng.length+" partite. Dati giocatori preservati.");
    } else {
      addGames(ng, merged);
      setMsg("✅ Aggiunte "+ng.length+" partite. Dati giocatori preservati.");
    }
    setPreview(null);
  };

  const exportJson = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:"application/json"}));
    a.download = "briscolone_"+todayStr().split("/").join("-")+".json";
    a.click();
  };

  const importJson = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.players||!data.allGames) { setMsg("❌ File JSON non valido."); return; }
        loadDb(data); setMsg("✅ Database caricato!");
      } catch { setMsg("❌ Errore nel file JSON."); }
    };
    reader.readAsText(file);
  };

  const exportXlsx = () => {
    const games = db.allGames;
    if (!games||!games.length) { setMsg("⚠️ Nessuna partita."); return; }
    const sp = [...players].sort((a,b)=>a.name.localeCompare(b.name));
    const getName = id => { const p=players.find(x=>x.id===id); return p?p.name:""; };
    const headers = ["Raggio","Data","Chiamante","Socio","Tipo","Soglia","Cappotto","Esito",...sp.map(p=>p.name)];
    const rows = [...games].sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map(g => [
      g.raggio||"", g.date||"", getName(g.callerId), g.partnerId?getName(g.partnerId):"",
      g.callType||"", g.soglia||61, g.cappotto?"sì":"no", g.callerWon?"vince":"perde",
      ...sp.map(p => g.pm?(g.pm[p.id]!==undefined?g.pm[p.id]:""):""),
    ]);
    const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
    // Larghezze colonne
    ws["!cols"] = headers.map((h,i) => ({ wch: i < 8 ? 14 : 10 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Partite");
    XLSX.writeFile(wb, "briscolone_"+todayStr().split("/").join("-")+".xlsx");
    setMsg("✅ File Excel scaricato!");
  };

  return (
    <div className="page">
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
        <span style={{ fontSize:26 }}>📥</span>
        <h2 style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:19, letterSpacing:2 }}>DATI</h2>
      </div>

      <div style={{ ...panel, marginBottom:12 }}>
        <div style={{ color:C.gold, fontWeight:700, fontSize:10, letterSpacing:2, marginBottom:6 }}>💾 BACKUP JSON</div>
        <div style={{ color:C.muted, fontSize:12, lineHeight:1.6, marginBottom:14 }}>Salva o ripristina tutto il database.</div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={exportJson} style={{ ...btnP, flex:1 }}>⬇️ Scarica</button>
          <label style={{ ...btnP, flex:1, textAlign:"center", cursor:"pointer" }}>
            ⬆️ Carica <input type="file" accept=".json" onChange={importJson} style={{ display:"none" }} />
          </label>
        </div>
      </div>

      <div style={{ ...panel, marginBottom:12, border:"1px solid " + C.green + "55" }}>
        <div style={{ color:C.green, fontWeight:700, fontSize:10, letterSpacing:2, marginBottom:6 }}>☁️ SINCRONIZZAZIONE FIREBASE</div>
        <div style={{ color:C.muted, fontSize:12, lineHeight:1.6, marginBottom:14 }}>Forza il salvataggio di tutti i dati su Firebase. Usalo se qualcosa non si è sincronizzato correttamente.</div>
        <button onClick={onForceSave} style={{ ...btnP, width:"100%", background:"linear-gradient(135deg,#1a5c2a,#27ae60)", border:"1px solid " + C.green }}>
          ☁️ FORZA AGGIORNAMENTO DB
        </button>
      </div>

      <div style={{ ...panel, marginBottom:20 }}>
        <div style={{ color:C.gold, fontWeight:700, fontSize:10, letterSpacing:2, marginBottom:6 }}>📊 ESPORTA EXCEL</div>
        <div style={{ color:C.muted, fontSize:12, lineHeight:1.6, marginBottom:14 }}>Una riga per partita, una colonna per giocatore. Compatibile con Excel e Google Sheets.</div>
        <button onClick={exportXlsx} style={{ ...btnP, width:"100%" }}>⬇️ Scarica Excel (.xlsx)</button>
      </div>

      <Divider />

      <div style={{ ...panel, marginBottom:14 }}>
        <div style={{ color:C.gold, fontWeight:700, fontSize:10, letterSpacing:2, marginBottom:6 }}>📂 IMPORTA EXCEL / CSV</div>

          {[["aggiungi","➕ Aggiungi","aggiunge al db"],["sostituisci","🔄 Sostituisci","cancella tutto"]].map(([v,l,sub]) => (
            <button key={v} onClick={() => setImportMode(v)} style={{
              flex:1, padding:"10px 8px", borderRadius:8, cursor:"pointer", fontFamily:"'Lato',sans-serif",

              color:importMode===v ? (v==="sostituisci"?C.red:C.green) : C.muted,
              border:"1px solid " + (importMode===v ? (v==="sostituisci"?C.red:C.green) : C.border),
            }}>
              <div style={{ fontWeight:800, fontSize:12 }}>{l}</div>
              <div style={{ fontSize:10, marginTop:2, opacity:.7 }}>{sub}</div>
            </button>
          ))}
        </div>
        <label style={{ display:"block", padding:20, border:"2px dashed "+C.border, borderRadius:10, textAlign:"center", cursor:"pointer", color:C.muted, fontSize:13 }}>

          <input type="file" accept=".xlsx,.csv,.xls" onChange={handleFile} style={{ display:"none" }} />
        </label>
      </div>

      {preview && (
        <div style={{ ...panelGold, marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <span style={{ color:C.gold, fontWeight:700 }}>Anteprima — {preview.rows.length} righe</span>
            <Badge color={preview.isBriscolone?C.green:C.muted}>{preview.isBriscolone?"Briscolone":"Generico"}</Badge>
          </div>
          <div style={{ overflowX:"auto", marginBottom:14 }}>
            <table style={{ borderCollapse:"collapse", fontSize:11, width:"100%" }}>
              <thead><tr>{preview.headers.map((h,i) => <th key={i} style={{ color:C.gold, padding:"4px 8px", textAlign:"left", borderBottom:"1px solid "+C.border, whiteSpace:"nowrap" }}>{h}</th>)}</tr></thead>
              <tbody>{preview.rows.slice(0,3).map((r,i) => <tr key={i}>{preview.headers.map((_,j) => <td key={j} style={{ color:C.cream, padding:"4px 8px" }}>{r[j]||""}</td>)}</tr>)}</tbody>
            </table>
          </div>
          {importMode==="sostituisci" && (
            <div style={{ background:C.red+"1a", border:"1px solid "+C.red+"44", borderRadius:7, padding:"8px 12px", marginBottom:12, color:C.red, fontSize:12, fontWeight:700 }}>
              ⚠️ Questo cancellerà tutto il database!
            </div>
          )}
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={() => setPreview(null)} style={{ ...btnG(C.muted), flex:1 }}>Annulla</button>
            <button onClick={doImport} style={{ ...btnP, flex:2 }}>{importMode==="sostituisci"?"🔄":"➕"} {preview.rows.length} partite</button>
          </div>
        </div>
      )}

      {msg && (
        <div style={{ background:msg.startsWith("✅")?C.green+"1a":C.red+"1a", border:"1px solid "+(msg.startsWith("✅")?C.green:C.red)+"55", borderRadius:8, padding:14, color:msg.startsWith("✅")?C.green:C.red, fontWeight:700, fontSize:13 }}>{msg}</div>
      )}

      <Divider />

      {/* ── GESTIONE RAGGI STORICI ── */}
      <div style={{ ...panel, marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
          <div style={{ color:C.gold, fontWeight:700, fontSize:10, letterSpacing:2 }}>🏅 RAGGI STORICI</div>
          <button onClick={()=>{ setEditRaggi(e=>!e); setRaggiEdits({}); }} style={{ ...btnG, fontSize:11, padding:"5px 10px" }}>{editRaggi?"✕ Chiudi":"✏️ Modifica"}</button>
        </div>
        <div style={{ color:C.muted, fontSize:12, marginBottom:12 }}>Assegna manualmente il vincitore ai raggi importati.</div>
        {(() => {
          const raggiNomi = [...new Set((allGames||[]).map(g=>g.raggio).filter(Boolean))].sort();
          if (!raggiNomi.length) return <div style={{ color:C.muted, fontSize:12, textAlign:"center", padding:"12px 0" }}>Nessun raggio trovato nelle partite.</div>;
          return raggiNomi.map(nome => {
            const existing = (raggi||[]).find(r=>r.nome===nome);
            const games = (allGames||[]).filter(g=>g.raggio===nome);
            const pts = {};
            players.forEach(p => { pts[p.id] = games.reduce((a,g)=>a+(g.pm?g.pm[p.id]||0:0),0); });
            const pids = players.filter(p=>games.some(g=>g.pids&&g.pids.includes(p.id)));
            const sorted = [...pids].sort((a,b)=>(pts[b.id]||0)-(pts[a.id]||0));
            const currentWinner = existing && existing.winner ? players.find(p=>p.id===existing.winner) : null;
            const editVal = raggiEdits[nome] !== undefined ? raggiEdits[nome] : (existing&&existing.winner)||"" ;
            return (
              <div key={nome} style={{ borderTop:"1px solid "+C.border+"44", paddingTop:10, marginTop:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <span style={{ color:C.cream, fontWeight:700, fontSize:13 }}>{nome}</span>
                  <span style={{ color:C.muted, fontSize:11 }}>{games.length} partite</span>
                </div>
                {!editRaggi ? (
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    {currentWinner ? (
                      <>
                        <span style={{ fontSize:14 }}>🏆</span>
                        <span style={{ color:C.gold, fontWeight:700, fontSize:13 }}>{currentWinner.name}</span>
                        <span style={{ color:C.muted, fontSize:11 }}>({pts[currentWinner.id]||0} pt)</span>
                      </>
                    ) : (
                      <span style={{ color:C.muted, fontSize:12, fontStyle:"italic" }}>Nessun vincitore assegnato</span>
                    )}
                  </div>
                ) : (
                  <div>
                    <div style={{ marginBottom:10 }}>
                      <div style={{ color:C.muted, fontSize:10, letterSpacing:1.5, marginBottom:5 }}>NOME RAGGIO</div>
                      <input value={raggiNomeEdits[nome]!==undefined?raggiNomeEdits[nome]:nome} onChange={e=>setRaggiNomeEdits(r=>({...r,[nome]:e.target.value}))} style={{ ...inp, fontSize:13 }} />
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))", gap:6, marginBottom:8 }}>
                      {sorted.map(p => (
                        <button key={p.id} onClick={()=>setRaggiEdits(r=>({...r,[nome]:p.id}))} style={{ padding:"7px 4px", borderRadius:7, cursor:"pointer", fontFamily:"'Lato',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", gap:3, background:editVal===p.id?"linear-gradient(135deg,"+C.goldD+","+C.gold+")":"rgba(0,0,0,.3)", border:"1px solid "+(editVal===p.id?C.gold:C.border) }}>
                          <div style={{ width:28,height:28,borderRadius:"50%",background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:p.emoji?14:10,overflow:"hidden" }}>
                            {p.photoUrl?<img src={p.photoUrl} style={{ width:"100%",height:"100%",objectFit:"cover" }} />:(p.emoji||p.name[0])}
                          </div>
                          <span style={{ color:editVal===p.id?"#1a0e00":C.cream, fontSize:9, fontWeight:700, textAlign:"center" }}>{p.name}</span>
                          <span style={{ color:editVal===p.id?"#1a0e00":C.muted, fontSize:9 }}>{pts[p.id]||0} pt</span>
                        </button>
                      ))}
                    </div>
                    <button onClick={()=>{
                      if (!editVal) return;
                      const winner = players.find(p=>p.id===editVal);
                      if (!winner) return;
                      const nuovoNome = (raggiNomeEdits[nome]||nome).trim()||nome;
                      const newRaggio = { id:nuovoNome, nome:nuovoNome, startDate:"", endDate:"", days:[], scores:{}, winner:editVal, winnerPts:pts[editVal]||0 };
                      const newRaggi = [...(raggi||[]).filter(r=>r.nome!==nome), newRaggio];
                      const newGames = (db.allGames||[]).map(g=>g.raggio===nome?{...g,raggio:nuovoNome}:g);
                      loadDb({...db, raggi:newRaggi, allGames:newGames, giornoGames:(db.giornoGames||[]).map(g=>g.raggio===nome?{...g,raggio:nuovoNome}:g)});
                      setRaggiEdits(r=>({...r,[nome]:undefined}));
                      setRaggiNomeEdits(r=>({...r,[nome]:undefined}));
                      setMsg("✅ Raggio "+nuovoNome+" aggiornato!");
                    }} style={{ ...btnP, width:"100%", padding:10 }}>💾 Salva</button>
                  </div>
                )}
              </div>
            );
          });
        })()}
      </div>

    </div>
  );
}


// ── THEME HOOK ────────────────────────────────────────────────────────────────
function useTheme() {
  const [themeId, setThemeIdState] = useState(getStoredTheme);
  useEffect(() => {
    const t = THEMES[themeId] || THEMES.casino;
    Object.assign(C, t);
    Object.assign(panel,    mkPanel());
    Object.assign(panelGold, mkPanelGold());
    Object.assign(btnP,     mkBtnP());
    Object.assign(btnD,     mkBtnD());
    Object.assign(inp,      mkInp());
    document.body.style.backgroundColor = t.felt;
    document.body.style.backgroundImage = t.bodyBg;
  }, [themeId]);
  const setThemeId = (id) => { storeTheme(id); setThemeIdState(id); };
  return { themeId, setThemeId };
}

// ── THEME SELECTOR ────────────────────────────────────────────────────────────
function ThemeSelector({ themeId, setThemeId, onClose }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.78)", zIndex:9500, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={onClose}>
      <div style={{ width:"100%", maxWidth:440, background:C.dark, borderTop:"2px solid "+C.gold+"66", borderTopLeftRadius:20, borderTopRightRadius:20, padding:"20px 16px 32px" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <span style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:15, letterSpacing:1 }}>🎨 TEMA</span>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, fontSize:22, cursor:"pointer" }}>✕</button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {Object.entries(THEMES).map(([id, t]) => (
            <button key={id} onClick={()=>{ setThemeId(id); onClose(); }} style={{
              display:"flex", alignItems:"center", gap:14,
              padding:"14px 16px", borderRadius:12, cursor:"pointer",
              background: themeId===id ? t.gold+"18" : "rgba(0,0,0,.3)",
              border:"2px solid " + (themeId===id ? t.gold : t.border),
              boxShadow: themeId===id ? "0 0 16px "+t.gold+"22" : "none",
            }}>
              <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                {[t.felt, t.gold, t.cream, t.red].map((col,i) => (
                  <div key={i} style={{ width:18, height:18, borderRadius:"50%", background:col, border:"1px solid rgba(255,255,255,.15)" }} />
                ))}
              </div>
              <span style={{ color: themeId===id ? t.gold : t.cream, fontWeight: themeId===id ? 700 : 400, fontSize:14, fontFamily:"'Lato',sans-serif", flex:1, textAlign:"left" }}>{t.name}</span>
              {themeId===id && <span style={{ color:t.gold, fontSize:16 }}>&#10003;</span>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

        {page==="dashboard"   && <PageDashboard players={players} allGames={allGames} raggi={raggi} giornoGames={giornoGames} raggioCorrenteNome={raggioCorrenteNome} themeId={themeId} showPcDashGlobal={showPcDashGlobal} onClosePcDash={()=>setShowPcDashGlobal(false)} />}
        {page==="giocatori"   && <PageGiocatori players={players} setPlayers={setPlayers} addPlayer={(p) => { const np = [...players, p]; setPlayers(np); fbSave({ players: np, allGames, giornoGames, raggioDays: [], raggi, raggioCorrenteNome }); }} onSavePlayers={() => fbSave({ players, allGames, giornoGames, raggioDays: [], raggi, raggioCorrenteNome })} allGames={allGames} raggi={raggi} themeId={themeId} />}
        {page==="partita"     && <PagePartita players={players} addGame={addGame} tableIds={tableIds} setTableIds={setTableIds} giornoGames={giornoGames} allGames={allGames} raggioCorrenteNome={raggioCorrenteNome} onChiudiRaggio={chiudiRaggio} callerId={callerId} setCallerId={setCallerId} partnerId={partnerId} setPartnerId={setPartnerId} callType={callType} setCallType={setCallType} soglia={soglia} setSoglia={setSoglia} cappotto={cappotto} setCappotto={setCappotto} callerWon={callerWon} setCallerWon={setCallerWon} date={gameDate} setDate={setGameDate} />}
        {page==="storico"     && <PageStorico allGames={allGames} players={players} deleteGame={deleteGame} updateGame={updateGame} themeId={themeId} />}
        {page==="dati"        && <PageDati players={players} setPlayers={setPlayers} addGames={addGames} db={dbData} loadDb={loadDb} allGames={allGames} raggi={raggi} onForceSave={() => fbSave({ players, allGames, giornoGames, raggioDays: [], raggi, raggioCorrenteNome })} fbStatus={fbStatus} />}
      </div>

      {showPcDashGlobal && <DashboardPC players={players} allGames={allGames} giornoGames={giornoGames||[]} raggi={raggi} raggioCorrenteNome={raggioCorrenteNome} onClose={()=>setShowPcDashGlobal(false)} />}
      {showTheme && <ThemeSelector themeId={themeId} setThemeId={setThemeId} onClose={()=>setShowTheme(false)} />}
      {confirmDlg && <Confirm title={confirmDlg.title} msg={confirmDlg.msg} onOk={()=>{const fn=confirmDlg.onOk;setConfirmDlg(null);fn();}} onCancel={()=>setConfirmDlg(null)} />}
      {infoDlg && <Info title={infoDlg.title} lines={infoDlg.lines} onOk={()=>setInfoDlg(null)} />}

      <div style={{
        position:"fixed", bottom:0, left:0, right:0,
        background:"linear-gradient(0deg,rgba(6,20,11,.97),rgba(10,30,18,.94))",
        borderTop:"1px solid "+C.gold+"2a",
        display:"flex", justifyContent:"space-around",
        padding:"5px 0 10px",
        boxShadow:"0 -4px 20px rgba(0,0,0,.6)",
      }}>
        {NAV_LEFT.map(n => (
          <button key={n.id} onClick={()=>setPage(n.id)} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"0 6px", flex:1 }}>
            <span style={{ fontSize:20, opacity:page===n.id?1:.25, filter:page===n.id?"drop-shadow(0 0 5px "+C.gold+")":"none", transition:"all .2s" }}>{n.icon}</span>
            <span style={{ fontSize:8, fontWeight:700, letterSpacing:1.5, color:page===n.id?C.gold:C.muted, transition:"color .2s" }}>{n.label.toUpperCase()}</span>
            {page===n.id && <div style={{ width:16, height:2, background:C.gold, borderRadius:1 }} />}
          </button>
        ))}
        {/* Centro: tasto Partita in rilievo */}
        <div style={{ flex:1, display:"flex", justifyContent:"center", alignItems:"flex-end", paddingBottom:4 }}>
          <button onClick={()=>setPage("partita")} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4, transform:"translateY(-10px)" }}>
            <div style={{ width:52, height:52, borderRadius:"50%", background:page==="partita"?"linear-gradient(135deg,"+C.goldD+","+C.gold+")":"linear-gradient(135deg,rgba(30,70,40,.95),rgba(15,45,25,.95))", border:"2px solid "+(page==="partita"?C.gold:C.gold+"55"), display:"flex", alignItems:"center", justifyContent:"center", boxShadow:page==="partita"?"0 0 16px "+C.gold+"55, 0 3px 12px rgba(0,0,0,.5)":"0 4px 16px rgba(0,0,0,.5)", transition:"all .25s" }}>
              <span style={{ fontSize:26 }}>🃏</span>
            </div>
            <span style={{ fontSize:8, fontWeight:700, letterSpacing:1.5, color:page==="partita"?C.gold:C.muted, transition:"color .2s" }}>PARTITA</span>
          </button>
        </div>
        {NAV_RIGHT.map(n => (
          <button key={n.id} onClick={()=>setPage(n.id)} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"0 6px", flex:1 }}>
            <span style={{ fontSize:20, opacity:page===n.id?1:.25, filter:page===n.id?"drop-shadow(0 0 5px "+C.gold+")":"none", transition:"all .2s" }}>{n.icon}</span>
            <span style={{ fontSize:8, fontWeight:700, letterSpacing:1.5, color:page===n.id?C.gold:C.muted, transition:"color .2s" }}>{n.label.toUpperCase()}</span>
            {page===n.id && <div style={{ width:16, height:2, background:C.gold, borderRadius:1 }} />}
          </button>
        ))}
      </div>

    </div>
  );
}

<script>
// ── SPLIT-FLAP ENGINE ─────────────────────────────────────────────────────────
(function(){
var SF_ALPHA = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+-';
function sfCharIdx(c){ var i=SF_ALPHA.indexOf((c||' ').toUpperCase()); return i<0?0:i; }
function sfNext(c){ return SF_ALPHA[(sfCharIdx(c)+1)%SF_ALPHA.length]; }
function sfSteps(from,to){ var f=sfCharIdx(from),t=sfCharIdx(to); return t>=f?t-f:SF_ALPHA.length-f+t; }

function SFCell(container, initChar, color){
  this.current=(initChar||' ').toUpperCase();
  this.color=color||'#f0e6c8';
  this.queue=[];
  this.busy=false;
  this.el=document.createElement('div');
  this.el.className='sf-cell';
  this.botDiv=document.createElement('div'); this.botDiv.className='sf-bot';
  this.botSpan=document.createElement('span'); this.botDiv.appendChild(this.botSpan);
  this.flapBot=document.createElement('div'); this.flapBot.className='sf-flap-bot';
  this.fbSpan=document.createElement('span'); this.flapBot.appendChild(this.fbSpan);
  var seam=document.createElement('div'); seam.className='sf-seam';
  this.el.appendChild(this.botDiv);
  this.el.appendChild(this.flapBot);
  this.el.appendChild(seam);
  container.appendChild(this.el);
  this._applyColor();
  this._show(this.current);
}
SFCell.prototype._applyColor=function(){
  var fg=this.color;
  this.botSpan.style.color=fg;
  this.fbSpan.style.color=fg;
};
SFCell.prototype._show=function(ch){
  var c=(ch||' ').toUpperCase();
  this.botSpan.textContent=c;
  this.fbSpan.textContent=c;
};
SFCell.prototype.setChar=function(target,delay){
  var t=(target||' ').toUpperCase();
  this.queue.push(t);
  var self=this;
  if(!this.busy) setTimeout(function(){self._pump();},delay||0);
};
SFCell.prototype._pump=function(){
  if(this.queue.length===0){this.busy=false;return;}
  this.busy=true;
  var target=this.queue[this.queue.length-1];
  this.queue=[];
  var steps=sfSteps(this.current,target);
  if(steps===0){this.busy=false;return;}
  var self=this, remaining=steps;
  function tick(){
    if(remaining===0){self.busy=false;self._pump();return;}
    remaining--;
    var incoming=remaining===0?target:sfNext(self.current);
    self._flipTo(incoming,tick);
  }
  tick();
};
SFCell.prototype._flipTo=function(incoming,done){
  var outgoing=this.current;
  this.botSpan.textContent=incoming.toUpperCase();
  this.fbSpan.textContent=incoming.toUpperCase();
  this.flapBot.style.transition='none';
  this.flapBot.style.transform='rotateX(90deg)';
  var self=this;
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    self.flapBot.style.transition='transform 75ms ease-out';
    self.flapBot.style.transform='rotateX(0deg)';
    setTimeout(function(){
      self.current=incoming;
      done();
    },110);
  });});
};

function SFString(container, length, initStr, color, cellW, cellH, cellFs){
  container.style.setProperty('--sf-w',(cellW||28)+'px');
  container.style.setProperty('--sf-h',(cellH||34)+'px');
  container.style.setProperty('--sf-fs',(cellFs||26)+'px');
  this.cells=[];
  var padded=((initStr||'').toUpperCase()).padStart(length,' ');
  for(var i=0;i<length;i++) this.cells.push(new SFCell(container,padded[i],color));
  this.length=length;
}
SFString.prototype.set=function(str,delay){
  var padded=((str||'').toUpperCase()).padStart(this.length,' ');
  for(var i=0;i<this.cells.length;i++) this.cells[i].setChar(padded[i],(delay||0)+i*20);
};
SFString.prototype.setColor=function(color){
  this.cells.forEach(function(c){c.color=color;c._applyColor();});
};

function SFNumber(container, cellH, cellFs){
  var h=cellH||34, fs=cellFs||26;
  container.style.setProperty('--sf-h',h+'px');
  container.style.setProperty('--sf-fs',fs+'px');
  // sign cell: narrower
  var signWrap=document.createElement('div');
  signWrap.style.cssText='display:inline-flex;';
  signWrap.style.setProperty('--sf-w',(h*0.7|0)+'px');
  container.appendChild(signWrap);
  this.signCell=new SFCell(signWrap,' ','#888');
  // 2 digit cells
  var digWrap=document.createElement('div');
  digWrap.style.cssText='display:inline-flex;';
  digWrap.style.setProperty('--sf-w',(h*0.75|0)+'px');
  container.appendChild(digWrap);
  this.digStr=new SFString(digWrap,2,'  ','#f0e6c8',h*0.75|0,h,fs);
  this.value=0;
}
SFNumber.prototype.set=function(val,animate){
  this.value=val;
  var sign=val>0?'+':val<0?'-':' ';
  var col=val>0?'#2ecc71':val<0?'#e74c3c':'#888';
  var abs=Math.abs(val);
  var str=String(abs).padStart(2,' ');
  this.signCell.color=col;
  if(animate===false){
    this.signCell.current=sign;
    this.signCell._applyColor();
    this.signCell._show(sign);
    var padded=str.toUpperCase().padStart(2,' ');
    this.digStr.cells.forEach(function(c,i){c.current=padded[i];c._show(padded[i]);});
    this.digStr.setColor('#f0e6c8');
  } else {
    this.signCell.setChar(sign,0);
    this.signCell._applyColor();
    this.digStr.setColor('#f0e6c8');
    this.digStr.set(str,30);
  }
};

// Expose globally
window.SFString=SFString;
window.SFNumber=SFNumber;
window.SFCell=SFCell;
})();
</script>
