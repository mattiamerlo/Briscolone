const nextRaggioName = (raggi) => {
  const nums = (raggi || []).map(r => {
    const s = r.nome || "";
    if (s.startsWith("Raggio")) {
      const n = parseInt(s.slice(6), 10);
      return isNaN(n) ? -1 : n;
    }
    return -1;
  }).filter(n => n >= 100);
  const max = nums.length > 0 ? Math.max(...nums) : 99;
  return "Raggio" + String(max + 1).padStart(3, "0");
};

function calcPoints(type, cappotto, soglia, callerWon) {
  const isAlone = type === "mano" || type === "carichi";
  const base = isAlone ? 4 : 2;
  const sogl = soglia >= 81 ? 3 : soglia >= 71 ? 2 : 1;
  const mult = sogl * (cappotto ? 2 : 1);
  if (callerWon) return { caller: base * mult, partner: isAlone ? 0 : mult, opponent: -mult };
  return { caller: -(base * mult), partner: isAlone ? 0 : -mult, opponent: mult };
}

function sumPts(pid, games) {
  return (games || []).reduce((a, g) => a + (g.pm ? (g.pm[pid] || 0) : 0), 0);
}

// ── FIREBASE ──────────────────────────────────────────────────────────────────
function useFirebase(loadDb) {
  const [status, setStatus] = useState("connecting");
  const unsubRef = useRef(null);

  useEffect(() => {
    const init = () => {
      setStatus("ok");
      unsubRef.current = window.__fbListen(loadDb);
    };
    if (window.__fbReady) init();
    else window.addEventListener("fbReady", init, { once: true });
    const t = setTimeout(() => setStatus(s => s === "connecting" ? "disabled" : s), 6000);
    return () => { clearTimeout(t); if (unsubRef.current) unsubRef.current(); };
  }, []);

  const save = async (data) => {
    if (status !== "ok") return;
    setStatus("saving");
    const ok = await window.__fbSave(data);
    setStatus(ok ? "ok" : "error");
    if (!ok) setTimeout(() => setStatus("ok"), 3000);
  };

  return { status, save };
}

        <span style={{ color:C.cream }}>{name}</span>
        <span style={{ fontWeight:700, color:col }}>{pts}/{m}</span>
      </div>
      <div style={{ background:"rgba(0,0,0,.4)", borderRadius:4, height:6, overflow:"hidden", border:"1px solid " + C.border }}>
        <div style={{ height:"100%", borderRadius:4, width:pct+"%", background:pts>=m ? C.green : "linear-gradient(90deg,"+C.goldD+","+C.gold+")", transition:"width .5s ease" }} />
      </div>
    </div>
  );
}

// ── PAGE: CLASSIFICHE ─────────────────────────────────────────────────────────
function PageClassifiche({ players, allGames, giornoGames, raggi, raggioCorrenteNome, onChiudiRaggio }) {
  const [tab, setTab] = useState("raggio");

  const [inclStorici, setInclStorici] = useState(false);
  const av = p => ({ emoji: p.emoji||"", photoUrl: p.photoUrl||"" });
  const raggioGames = allGames.filter(g => g.raggio === raggioCorrenteNome);

  const giornoRows = players
    .filter(p => giornoGames.some(g => g.pids && g.pids.includes(p.id)))
    .map(p => ({ id:p.id, name:p.name, pts:sumPts(p.id, giornoGames), ...av(p) }))
    .sort((a,b) => b.pts - a.pts);

  const raggioRows = players
    .filter(p => raggioGames.some(g => g.pids && g.pids.includes(p.id)))
    .map(p => ({ id:p.id, name:p.name, pts:sumPts(p.id, raggioGames), sub:raggioGames.filter(g => g.pids && g.pids.includes(p.id)).length + " partite", ...av(p) }))
    .sort((a,b) => b.pts - a.pts);

  const genRows = players
    .map(p => {
      const mg = allGames.filter(g => g.pids && g.pids.includes(p.id));
      const won = mg.filter(g => (g.pm ? (g.pm[p.id]||0) : 0) > 0).length;
      const pts = sumPts(p.id, allGames) + (inclStorici ? (p.storiciPunti || 0) : 0);
      const raggiVinti = (raggi||[]).filter(r=>r.winner===p.id||r.winner===p.name).length + (inclStorici ? (p.storiciRaggi||0) : 0);
      const displayName = p.nickname ? p.name + ' "' + p.nickname + '"' : p.name;
      return { id:p.id, name:displayName, pts, sub:mg.length+" partite · "+(mg.length ? Math.round(won/mg.length*100) : 0)+"% vinte · 🏆 "+raggiVinti, ...av(p) };
    })
    .filter(r => allGames.some(g => g.pids && g.pids.includes(r.id)))
    .sort((a,b) => b.pts - a.pts);

  const TABS = [
    { id:"giorno",   label:"☀️ Oggi" },
    { id:"raggio",   label:"⚡ Raggio" },
    { id:"generale", label:"🏆 All Time" },
    { id:"topraggi", label:"🥇 Top Raggi" },
  ];

  return (
    <div className="page">
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
        <span style={{ fontSize:26 }}>🏆</span>
        <h2 style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:19, letterSpacing:2 }}>CLASSIFICHE</h2>
      </div>
      <div style={{ display:"flex", gap:6, marginBottom:18, overflowX:"auto", paddingBottom:4 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding:"8px 14px", borderRadius:20, cursor:"pointer", whiteSpace:"nowrap",
            fontWeight:700, fontSize:11, fontFamily:"'Lato',sans-serif", letterSpacing:1,
            background:tab===t.id ? "linear-gradient(135deg,"+C.goldD+","+C.gold+")" : "rgba(0,0,0,.3)",
            color:tab===t.id ? "#1a0e00" : C.muted,
            border:"1px solid " + (tab===t.id ? C.gold : C.border),
          }}>{t.label}</button>
        ))}
      </div>

      {tab==="giorno" && (
        <div>
          <div style={{ color:C.muted, fontSize:12, marginBottom:14 }}>Partite di oggi · {giornoGames.length} giocate</div>
          <RankList rows={giornoRows} />
        </div>
      )}

      {tab==="raggio" && (
        <div>
          {raggioRows[0] && raggioRows[0].pts >= 12 && (
            <div style={{ background:"rgba(201,168,76,.1)", border:"1px solid "+C.gold+"66", borderRadius:8, padding:"10px 14px", marginBottom:14, display:"flex", gap:10, alignItems:"center" }}>
              <span>⚠️</span>
              <span style={{ color:C.gold, fontSize:13, fontWeight:700 }}>{raggioRows[0].name} è a {raggioRows[0].pts} punti!</span>
            </div>
          )}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={{ color:C.muted, fontSize:12 }}>{raggioCorrenteNome} · {raggioGames.length} partite</div>
            <Badge color={C.gold}>Soglia 15 pt</Badge>
          </div>
          <RankList rows={raggioRows} />
          <button onClick={onChiudiRaggio} style={{ ...btnP, width:"100%", marginTop:14, padding:14, background:"linear-gradient(135deg,#4a0f6e,#8e44ad)", color:"#fff", border:"1px solid #8e44ad" }}>
            🏁 CHIUDI RAGGIO
          </button>
          {raggi.length > 0 && (
            <div style={{ marginTop:20 }}>
              <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:11, letterSpacing:2, marginBottom:12, opacity:.8 }}>RAGGI PRECEDENTI</div>
              {[...raggi].reverse().map((r, ri) => {
                const rNome = r.nome || ("Raggio #"+(raggi.length-ri));
                const winnerPlayer = r.winner ? players.find(p=>p.id===r.winner) : null;
                const winnerName = winnerPlayer ? winnerPlayer.name : (r.winner||"");
                const rGames = allGames.filter(g=>g.raggio===rNome);
                const hasScores = r.scores && r.scores.length > 0;
                const scoreRows = hasScores
                  ? [...r.scores].sort((a,b)=>b.pts-a.pts)
                  : players
                      .map(p=>({ pid:p.id, name:p.name, pts:rGames.reduce((acc,g)=>acc+(g.pm?g.pm[p.id]||0:0),0) }))
                      .filter(s=>rGames.some(g=>g.pids&&g.pids.includes(s.pid)))
                      .sort((a,b)=>b.pts-a.pts);
                return (
                  <div key={r.id||rNome} style={{ ...panel, marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                      <span style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:13 }}>{rNome}</span>
                      <span style={{ color:C.muted, fontSize:11 }}>{rGames.length} partite{r.startDate?" · "+r.startDate:""}</span>
                    </div>
                    {winnerName && (
                      <div style={{ background:"rgba(142,68,173,.15)", border:"1px solid "+C.purple+"44", borderRadius:6, padding:"7px 12px", marginBottom:8, display:"flex", gap:8, alignItems:"center" }}>
                        <span>🏆</span><span style={{ color:"#c39bd3", fontWeight:700 }}>{winnerName}{r.winnerPts?" — "+r.winnerPts+" pt":""}</span>
                      </div>
                    )}
                    {scoreRows.map((s,si) => {
                        const sp = players.find(p=>p.id===s.pid);
                        return (<div key={s.pid} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:13, padding:"5px 0", borderBottom:si<scoreRows.length-1?"1px solid "+C.border+"33":"none" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ color:si===0?C.gold:C.muted, fontSize:11, width:18, textAlign:"center", fontWeight:700 }}>{si===0?"🥇":si===1?"🥈":si===2?"🥉":"#"+(si+1)}</span>
                            {sp && <Avatar p={sp} size={26} />}
                            <span style={{ color:C.cream, fontWeight:600 }}>{s.name}</span>
                          </div>
                          <Pts v={s.pts} />
                        </div>);
                      })}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {tab==="generale" && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={{ color:C.muted, fontSize:12 }}>Classifica storica completa</div>
            <button onClick={() => setInclStorici(v=>!v)} style={{
              padding:"5px 12px", borderRadius:20, cursor:"pointer", fontFamily:"'Lato',sans-serif",
              fontWeight:700, fontSize:11, letterSpacing:.5,
              background: inclStorici ? C.gold+"22" : "rgba(0,0,0,.3)",
              color: inclStorici ? C.gold : C.muted,
              border:"1px solid " + (inclStorici ? C.gold : C.border),
            }}>
              {inclStorici ? "📚 Con storici" : "📊 Solo app"}
            </button>
          </div>
          {inclStorici && (
            <div style={{ background:"rgba(201,168,76,.08)", border:"1px solid "+C.gold+"33", borderRadius:7, padding:"7px 12px", marginBottom:12, color:C.gold, fontSize:11 }}>
              ✨ Include punti e raggi inseriti manualmente
            </div>
          )}
          <RankList rows={genRows} />
        </div>
      )}

      {tab==="topraggi" && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={{ color:C.muted, fontSize:12 }}>{raggi.length} raggi completati</div>
            <button onClick={() => setInclStorici(v=>!v)} style={{
              padding:"5px 12px", borderRadius:20, cursor:"pointer", fontFamily:"'Lato',sans-serif",
              fontWeight:700, fontSize:11, letterSpacing:.5,
              background: inclStorici ? C.gold+"22" : "rgba(0,0,0,.3)",
              color: inclStorici ? C.gold : C.muted,
              border:"1px solid " + (inclStorici ? C.gold : C.border),
            }}>{inclStorici ? "📚 Con storici" : "📊 Solo app"}</button>
          </div>
          {raggi.length===0 && !inclStorici && <div style={{ textAlign:"center", padding:40, color:C.muted }}><div style={{ fontSize:36, marginBottom:8, opacity:.4 }}>🏆</div>Nessun raggio completato.</div>}
          <div style={{ ...panel, marginBottom:14 }}>
            <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:11, letterSpacing:2, marginBottom:12 }}>🥇 CLASSIFICA RAGGI VINTI</div>
            {players
              .map(p => ({
                ...p,
                raggiApp: (raggi||[]).filter(r=>r.winner===p.id||r.winner===p.name).length,
                raggiStorici: inclStorici ? (p.storiciRaggi||0) : 0,
              }))
              .map(p => ({ ...p, tot: p.raggiApp + p.raggiStorici }))
              .filter(p => p.tot > 0)
              .sort((a,b) => b.tot - a.tot || b.raggiApp - a.raggiApp)
              .map((p, i) => (
                <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:"1px solid "+C.border+"33" }}>
                  <span style={{ color:i===0?C.gold:C.muted, fontSize:14, width:22, textAlign:"center", fontWeight:700 }}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1)}</span>
                  <Avatar p={p} size={32} />
                  <span style={{ color:C.cream, fontWeight:700, flex:1, fontSize:14 }}>{p.name}</span>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:18, fontWeight:700 }}>{p.tot} 🏆</div>
                    {inclStorici && p.raggiStorici > 0 && (
                      <div style={{ color:C.muted, fontSize:10 }}>{p.raggiApp} app + {p.raggiStorici} storici</div>
                    )}
                  </div>
                </div>
              ))
            }
            {players.every(p => ((raggi||[]).filter(r=>r.winner===p.id||r.winner===p.name).length + (inclStorici?p.storiciRaggi||0:0)) === 0) && (
              <div style={{ color:C.muted, fontSize:12, textAlign:"center", padding:"12px 0" }}>Nessun raggio vinto registrato</div>
            )}
          </div>
        </div>

      )}
    </div>
  );
}

// ── PAGE: GIOCATORI ───────────────────────────────────────────────────────────
function PageGiocatori({ players, setPlayers, addPlayer, onSavePlayers, allGames, raggi }) {
  const [name, setName] = useState("");
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});

  const avatarColors = [C.red, "#2980b9", C.goldD, C.green, C.purple, "#e67e22"];

  const stats = players.map(p => {
    const mg = allGames.filter(g => g.pids && g.pids.includes(p.id));
    const won = mg.filter(g => (g.pm ? (g.pm[p.id]||0) : 0) > 0).length;
    const raggiVinti = ((raggi || []).filter(r => r.winner === p.id || r.winner === p.name).length) + (p.storiciRaggi || 0);
    const totalPts = sumPts(p.id, allGames) + (p.storiciPunti || 0);
    return { ...p, played:mg.length, won, lost:mg.filter(g=>(g.pm?(g.pm[p.id]||0):0)<0).length,
      totalPts, asCaller:mg.filter(g=>g.callerId===p.id).length,
      asPartner:mg.filter(g=>g.partnerId===p.id).length,
      winRate:mg.length ? Math.round(won/mg.length*100) : 0, raggiVinti };
  }).sort((a,b) => a.name.localeCompare(b.name, "it"));

  const [viewId, setViewId] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const view = stats.find(p => p.id === viewId);
  const toDelete = stats.find(p => p.id === deleteId);

  const add = () => {
    const n = name.trim();
    if (!n || players.find(p => p.name.toLowerCase()===n.toLowerCase())) return;
    addPlayer({ id:uid(), name:n, nickname:"", storiciPunti:0, storiciRaggi:0 });
    setName("");
  };

  const [emojiPicker, setEmojiPicker] = useState(false);
  const EMOJI_CATS = [
    { label:"😀 Facce", emojis:["😀","😃","😄","😁","😆","😅","🤣","😂","🙂","😊","😇","🥰","😍","🤩","😘","😎","🤠","🥸","🧐","🤓","😈","👿","👹","👺","💀","☠️","🤡","👻","👾","🤖","🎭","🥷"] },
    { label:"🐯 Animali", emojis:["🐯","🦁","🐻","🐼","🦊","🐺","🦝","🐸","🐙","🦄","🐉","🦅","🦆","🦉","🦋","🐝","🦈","🐬","🐘","🦏","🦍","🐆","🐅","🦓","🐊","🦕","🦖","🦑","🐓","🦃","🦚","🦜"] },
    { label:"👑 Simboli gioco", emojis:["👑","🎩","🃏","♠️","♥️","♦️","♣️","🎰","🍀","⚡","🔥","💎","🏆","⚔️","🗡️","🛡️","💣","🎯","🎲","🀄","🎴","🧩","🎪","🎠","🎡","🤺","🏹","🪃","🔮","🧿","🪬","💫"] },
    { label:"⚽ Sport", emojis:["⚽","🏀","🏈","⚾","🎾","🏐","🏉","🎱","🏓","🏸","🥊","🥋","🤼","🏋️","🤸","⛷️","🏂","🏇","🚴","🤾","🧗","🤺","🥇","🥈","🥉","🏆","🎖️","🏅","🎗️","🎀","🎁","🎊"] },
    { label:"🌙 Natura", emojis:["🌙","⭐","🌟","💫","✨","☄️","🌈","⛈️","🌊","🌋","🏔️","🌵","🌴","🍄","🌹","🌺","🌸","🌼","🌻","🍀","🍁","🍂","🌾","🐚","🪸","🌍","🌙","☀️","🌤️","🌪️","❄️","🔥"] },
    { label:"💎 Oggetti", emojis:["💎","💍","👒","🎭","🪄","🔮","🧿","💰","💵","💳","🗝️","🔑","🪙","📿","🧲","⚙️","🔧","🪛","🔩","🪝","🧨","🪬","🪩","🎸","🎺","🎻","🥁","🎷","🎹","🪗","🎤","🎧"] },
  ];

    setEditId(p.id);
    setEditForm({ name:p.name, nickname:p.nickname||"", storiciPunti:p.storiciPunti||0, storiciRaggi:p.storiciRaggi||0, emoji:p.emoji||"", photoUrl:p.photoUrl||"" });
    setEmojiPicker(false);
  };

  const saveEdit = () => {
    const n = editForm.name.trim();
    if (!n) return;
    setPlayers(ps => ps.map(p => p.id===editId ? {
      ...p,
      name: n,
      nickname: editForm.nickname.trim(),
      storiciPunti: parseInt(editForm.storiciPunti, 10) || 0,
      storiciRaggi: parseInt(editForm.storiciRaggi, 10) || 0,
      emoji: editForm.emoji || "",
      photoUrl: editForm.photoUrl.trim() || "",
    } : p));
    setEditId(null);
    setEmojiPicker(false);
  };

  const ef = (key) => (e) => setEditForm(f => ({...f, [key]: e.target.value}));

    <div className="page">
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
        <span style={{ fontSize:26 }}>♟️</span>
        <h2 style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:19, letterSpacing:2 }}>GIOCATORI</h2>

              {p.photoUrl
                ? <img src={p.photoUrl} alt={p.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} onError={e=>{e.target.style.display="none"; e.target.parentNode.style.background=avatarColors[idx%avatarColors.length];}} />
                : <div style={{ width:"100%", height:"100%", background:avatarColors[idx%avatarColors.length], display:"flex", alignItems:"center", justifyContent:"center", fontSize:p.emoji?22:17, fontWeight:900, color:"#fff" }}>
                    {p.emoji || p.name[0].toUpperCase()}
                  </div>
              }
            </div>
            <div style={{ flex:1, minWidth:0, cursor:"pointer" }} onClick={() => setViewId(p.id)}>
              <div style={{ color:C.cream, fontWeight:700 }}>
                {p.name}
                {p.nickname ? <span style={{ color:C.gold, fontSize:12, fontWeight:400, marginLeft:6 }}>"{p.nickname}"</span> : null}
              </div>
              <div style={{ color:C.muted, fontSize:11, marginTop:2 }}>
                {p.played} partite · {p.winRate}% vinte{p.raggiVinti > 0 ? " · 🏆 "+p.raggiVinti : ""}
                {p.storiciPunti ? <span style={{ color:C.goldD }}> · +{p.storiciPunti}pt storici</span> : null}
              </div>
            </div>
            <Pts v={p.totalPts} />
            <button onClick={() => openEdit(p)} style={{ ...btnG(C.gold), width:"auto", padding:"6px 10px", fontSize:14 }}>✏️</button>
            <button onClick={e=>{e.stopPropagation(); setDeleteId(p.id);}} style={btnD}>✕</button>
          </div>
        ))}
      </div>

      {view && (
        <Modal title={view.name + (view.nickname ? ' "'+view.nickname+'"' : "")} onClose={() => setViewId(null)}>
          <div style={{ display:"flex", justifyContent:"center", marginBottom:16 }}>
            <div style={{ width:72, height:72, borderRadius:"50%", border:"3px solid "+C.gold, overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,.3)", fontSize:view.photoUrl?"inherit":view.emoji?36:28, fontWeight:900, color:"#fff", boxShadow:"0 0 20px rgba(201,168,76,.25)" }}>
              {view.photoUrl
                ? <img src={view.photoUrl} alt={view.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                : (view.emoji || view.name[0].toUpperCase())}
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:14 }}>
            {[["Partite",view.played,C.muted],["Vittorie",view.won,C.green],["Sconfitte",view.lost,C.red],
              ["Punti",view.totalPts>0?"+"+view.totalPts:view.totalPts,C.gold],
              ["Win %",view.winRate+"%",C.gold],["Raggi",view.raggiVinti+" 🏆",C.purple]].map(([l,v,c])=>(
              <div key={l} style={{ textAlign:"center", background:"rgba(0,0,0,.3)", borderRadius:8, padding:"12px 6px", border:"1px solid "+C.border }}>
                <div style={{ color:c, fontWeight:900, fontSize:20 }}>{v}</div>
                <div style={{ color:C.muted, fontSize:10, marginTop:3, letterSpacing:.5 }}>{l.toUpperCase()}</div>
              </div>
            ))}
          </div>
          <div style={{ color:C.muted, fontSize:12, textAlign:"center", marginBottom:14 }}>Chiamante {view.asCaller}× · Socio {view.asPartner}×</div>
          <button onClick={() => { setViewId(null); openEdit(players.find(p=>p.id===view.id)); }} style={{ ...btnG(C.gold), width:"auto", padding:"8px 18px" }}>✏️ Modifica</button>
        </Modal>
      )}

      {stats.length > 0 && (
        <button onClick={onSavePlayers} style={{ ...btnP, width:"100%", marginTop:16, background:"linear-gradient(135deg,#1a5c2a,#27ae60)", border:"1px solid "+C.green, color:"#fff" }}>
          ☁️ SALVA GIOCATORI SU FIREBASE
        </button>
      )}

      {toDelete && (
        <Confirm
          title={"Elimina " + toDelete.name + "?"}
          msg={"Verranno rimossi il giocatore e tutti i suoi dati dalla lista. Le partite già registrate non verranno cancellate."}
          onOk={() => { setPlayers(ps => ps.filter(x => x.id !== deleteId)); setDeleteId(null); }}
          onCancel={() => setDeleteId(null)}
        />
      )}

      {editId && (

                  {editForm.photoUrl

// ── DASHBOARD PC ──────────────────────────────────────────────────────────────
function DashboardPC({ players, allGames, giornoGames, raggi, raggioCorrenteNome, onClose }) {

  var LS_KEY = "briscoPC_v2";
  var PERIODS = [
    { id:"oggi",      label:"Oggi",            icon:"☀️" },
    { id:"settimana", label:"Settimana",        icon:"📅" },
    { id:"mese",      label:"Mese",             icon:"🗓" },
    { id:"anno",      label:"Anno",             icon:"📆" },
    { id:"raggio",    label:"Raggio corrente",  icon:"⚡" },
    { id:"alltime",   label:"All Time",         icon:"🏆" },
    { id:"storico",   label:"All Time+Storici", icon:"📚" },
  ];
  var DEF_PANELS = [
    { id:"p1", period:"oggi",      mode:"modern" },
    { id:"p2", period:"settimana", mode:"modern" },
    { id:"p3", period:"mese",      mode:"modern" },
    { id:"p4", period:"raggio",    mode:"modern" },
    { id:"p5", period:"alltime",   mode:"modern" },
  ];
  var DEF_CHARTS = [
    { id:"c1", period:"alltime" },
    { id:"c2", period:"raggio"  },
  ];

  var loadCfg = function() {
    try { var v=localStorage.getItem(LS_KEY); return v?JSON.parse(v):null; } catch(e){return null;}
  };
  var saveCfg = function(panels,charts) {
    try { localStorage.setItem(LS_KEY,JSON.stringify({panels:panels,charts:charts})); } catch(e){}
  };

  var saved = loadCfg();
  var [panels, setPanels] = useState(saved&&saved.panels ? saved.panels : DEF_PANELS);
  var [charts, setCharts] = useState(saved&&saved.charts ? saved.charts : DEF_CHARTS);
  var [editMode, setEditMode] = useState(false);

  // Save whenever panels or charts change
  React.useEffect(function(){ saveCfg(panels,charts); }, [panels,charts]);

  var parseD = function(g) {
    var p=(g.date||"").split("/");
    return p.length===3?new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])):null;
  };
  var getGames = function(period) {
    if(period==="oggi") return giornoGames||[];
    if(period==="raggio") return allGames.filter(function(g){return g.raggio===raggioCorrenteNome;});
    if(period==="alltime"||period==="storico") return allGames;
    var now=new Date(); now.setHours(23,59,59,999);
    var cut=new Date();
    if(period==="settimana"){var d=cut.getDay();cut.setDate(cut.getDate()-(d===0?6:d-1));cut.setHours(0,0,0,0);}
    else if(period==="mese"){cut.setDate(1);cut.setHours(0,0,0,0);}
    else if(period==="anno"){cut.setMonth(0,1);cut.setHours(0,0,0,0);}
    return allGames.filter(function(g){var d=parseD(g);return d&&d>=cut&&d<=now;});
  };
  var makeRows = function(games,period) {
    return players.map(function(p){
      return {
        id:p.id,name:p.name,emoji:p.emoji||"",photoUrl:p.photoUrl||"",
        pts:sumPts(p.id,games)+(period==="storico"?(p.storiciPunti||0):0),
        n:games.filter(function(g){return g.pids&&g.pids.includes(p.id);}).length,
      };
    }).filter(function(p){return p.n>0||(period==="storico"&&(p.storiciPunti||0)>0);})
      .sort(function(a,b){return b.pts-a.pts;});
  };

  var total=allGames.length;
  var cw=allGames.filter(function(g){return g.callerWon;}).length;
  var cap=allGames.filter(function(g){return g.cappotto;}).length;
  var rc=(raggi||[]).filter(function(r){return r.winner;}).length;
  var cwPct=total?Math.round(cw/total*100):0;
  var capPct=total?Math.round(cap/total*100):0;
  var rgGames=allGames.filter(function(g){return g.raggio===raggioCorrenteNome;});
  var COLORS=["#c9a84c","#e74c3c","#3498db","#2ecc71","#9b59b6","#e67e22","#1abc9c"];
  var MEDALS=["🥇","🥈","🥉"];

  var updatePanel = function(id,changes) {
    setPanels(function(ps){return ps.map(function(p){return p.id===id?Object.assign({},p,changes):p;});});
  };
  var uid2 = function(prefix){ return prefix+(Math.random()*9999|0); };

  var PSelect = function(props) {
    return (
      <select value={props.value} onChange={function(e){props.onChange(e.target.value);}}
        style={{ background:C.darker, border:"1px solid "+C.gold+"55", borderRadius:5, color:C.cream, fontSize:10, padding:"2px 6px", cursor:"pointer", fontFamily:"'Lato',sans-serif" }}>
        {PERIODS.map(function(o){return <option key={o.id} value={o.id}>{o.icon} {o.label}</option>;})}
      </select>
    );
  };

  // ── SPLIT-FLAP RANK PANEL ────────────────────────────────────────────────────
  var SFPanel = function(props) {
    var panel=props.panel, rows=props.rows;
    var containerRef = React.useRef(null);
    var sfRows = React.useRef([]);
    var prevRows = React.useRef([]);

    React.useEffect(function(){
      if(!containerRef.current || typeof window.SFString==="undefined") return;
      var container = containerRef.current;
      // First render: build DOM
      if(sfRows.current.length===0) {
        container.innerHTML="";
        sfRows.current = rows.map(function(r,i){
          var rowEl=document.createElement("div");
          rowEl.style.cssText="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid "+C.border+"33;";
          container.appendChild(rowEl);
          // medal
          var medal=document.createElement("span");
          medal.style.cssText="font-size:13px;width:20px;text-align:center;flex-shrink:0;";
          medal.textContent=i<3?MEDALS[i]:"#"+(i+1);
          rowEl.appendChild(medal);
          // avatar
          var av=document.createElement("div");
          av.style.cssText="width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.35);border:1px solid "+C.border+";display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;overflow:hidden;";
          if(r.photoUrl){var img=document.createElement("img");img.src=r.photoUrl;img.style.cssText="width:100%;height:100%;object-fit:cover;";av.appendChild(img);}
          else av.textContent=r.emoji||r.name[0];
          rowEl.appendChild(av);
          // name flap
          var nameWrap=document.createElement("div");
          nameWrap.style.cssText="display:inline-flex;flex:1;overflow:hidden;";
          rowEl.appendChild(nameWrap);
          var nameLen=Math.min(r.name.length,10);
          var nameSF=new window.SFString(nameWrap,nameLen,r.name,"#ffffff",22,30,22);
          // score flap
          var scoreWrap=document.createElement("div");
          scoreWrap.style.cssText="display:inline-flex;flex-shrink:0;";
          rowEl.appendChild(scoreWrap);
          var numSF=new window.SFNumber(scoreWrap,30,22);
          numSF.set(r.pts,false);
          return {rowEl,nameSF,numSF,medal,av,nameLen};
        });
        prevRows.current=rows.map(function(r){return {id:r.id,name:r.name,pts:r.pts};});
        return;
      }
      // Update: animate changed values
      rows.forEach(function(r,i){
        if(!sfRows.current[i]) return;
        var prev=prevRows.current[i];
        if(!prev||prev.id!==r.id||prev.name!==r.name){
          sfRows.current[i].nameSF.set(r.name,0);
        }
        if(!prev||prev.pts!==r.pts){
          sfRows.current[i].numSF.set(r.pts,true);
        }
        // Update medal
        sfRows.current[i].medal.textContent=i<3?MEDALS[i]:"#"+(i+1);
      });
      prevRows.current=rows.map(function(r){return {id:r.id,name:r.name,pts:r.pts};});
    }, [rows]);

    return (
      <div style={{ background:C.panelBg, border:"1px solid "+(editMode?C.gold+"88":C.gold+"22"), borderRadius:10, padding:"10px 12px", flex:1, minWidth:0, display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, gap:4 }}>
          <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:1.5, fontWeight:700 }}>
            {(PERIODS.find(function(o){return o.id===panel.period;})||PERIODS[0]).icon} {(PERIODS.find(function(o){return o.id===panel.period;})||PERIODS[0]).label.toUpperCase()}
          </div>
          {editMode && (
            <div style={{ display:"flex", gap:4, flexShrink:0 }}>
              <button onClick={function(){updatePanel(panel.id,{mode:"modern"});}} style={{ background:panel.mode==="modern"?C.gold+"33":"rgba(0,0,0,.3)", border:"1px solid "+(panel.mode==="modern"?C.gold:C.border), borderRadius:5, color:panel.mode==="modern"?C.gold:C.muted, cursor:"pointer", fontSize:9, padding:"2px 6px" }}>Moderno</button>
              <button onClick={function(){updatePanel(panel.id,{mode:"flap"});}} style={{ background:panel.mode==="flap"?C.gold+"33":"rgba(0,0,0,.3)", border:"1px solid "+(panel.mode==="flap"?C.gold:C.border), borderRadius:5, color:panel.mode==="flap"?C.gold:C.muted, cursor:"pointer", fontSize:9, padding:"2px 6px" }}>Classico</button>
              <PSelect value={panel.period} onChange={function(v){updatePanel(panel.id,{period:v});}}/>
              <button onClick={function(){setPanels(function(ps){return ps.filter(function(p){return p.id!==panel.id;});});}} style={{ background:C.red+"22", border:"1px solid "+C.red+"55", borderRadius:5, color:C.red, cursor:"pointer", fontSize:12, padding:"1px 7px" }}>✕</button>
            </div>
          )}
        </div>
        {rows.length===0
          ? <div style={{ color:C.muted, fontSize:12, textAlign:"center", padding:"12px 0", flex:1 }}>Nessuna partita</div>
          : <div ref={containerRef} style={{ flex:1 }}></div>
        }
      </div>
    );
  };

  // ── MODERN RANK PANEL ────────────────────────────────────────────────────────
  var ModernPanel = function(props) {
    var panel=props.panel, rows=props.rows;
    var opt=PERIODS.find(function(o){return o.id===panel.period;})||PERIODS[0];
    return (
      <div style={{ background:C.panelBg, border:"1px solid "+(editMode?C.gold+"88":C.gold+"22"), borderRadius:10, padding:"10px 12px", flex:1, minWidth:0, display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, gap:4 }}>
          <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:1.5, fontWeight:700 }}>{opt.icon} {opt.label.toUpperCase()}</div>
          {editMode && (
            <div style={{ display:"flex", gap:4, flexShrink:0 }}>
              <button onClick={function(){updatePanel(panel.id,{mode:"modern"});}} style={{ background:panel.mode==="modern"?C.gold+"33":"rgba(0,0,0,.3)", border:"1px solid "+(panel.mode==="modern"?C.gold:C.border), borderRadius:5, color:panel.mode==="modern"?C.gold:C.muted, cursor:"pointer", fontSize:9, padding:"2px 6px" }}>Moderno</button>
              <button onClick={function(){updatePanel(panel.id,{mode:"flap"});}} style={{ background:panel.mode==="flap"?C.gold+"33":"rgba(0,0,0,.3)", border:"1px solid "+(panel.mode==="flap"?C.gold:C.border), borderRadius:5, color:panel.mode==="flap"?C.gold:C.muted, cursor:"pointer", fontSize:9, padding:"2px 6px" }}>Classico</button>
              <PSelect value={panel.period} onChange={function(v){updatePanel(panel.id,{period:v});}}/>
              <button onClick={function(){setPanels(function(ps){return ps.filter(function(p){return p.id!==panel.id;});});}} style={{ background:C.red+"22", border:"1px solid "+C.red+"55", borderRadius:5, color:C.red, cursor:"pointer", fontSize:12, padding:"1px 7px" }}>✕</button>
            </div>
          )}
        </div>
        {rows.length===0
          ? <div style={{ color:C.muted, fontSize:12, textAlign:"center", padding:"12px 0", flex:1 }}>Nessuna partita</div>
          : rows.map(function(r,i){
              return (
                <div key={r.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 0", borderBottom:i<rows.length-1?"1px solid "+C.border+"33":"none" }}>
                  <span style={{ color:i===0?C.gold:C.muted, fontSize:12, width:20, textAlign:"center", fontWeight:700, flexShrink:0 }}>{i<3?MEDALS[i]:"#"+(i+1)}</span>
                  <div style={{ width:28,height:28,borderRadius:"50%",background:"rgba(0,0,0,.35)",border:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:r.emoji?14:10,flexShrink:0,overflow:"hidden" }}>
                    {r.photoUrl?<img src={r.photoUrl} style={{ width:"100%",height:"100%",objectFit:"cover" }}/>:(r.emoji||r.name[0])}
                  </div>
                  <span style={{ color:"#ffffff", fontSize:14, fontWeight:700, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.name}</span>
                  <span style={{ color:r.pts>0?C.green:r.pts<0?C.red:C.muted, fontSize:16, fontWeight:900, fontFamily:"'Cinzel',serif", flexShrink:0 }}>{r.pts>0?"+":""}{r.pts}</span>
                </div>
              );
            })
        }
      </div>
    );
  };

  // ── CHART PANEL ──────────────────────────────────────────────────────────────
  var ChartPanel = function(props) {
    var chart=props.chart;
    var opt=PERIODS.find(function(o){return o.id===chart.period;})||PERIODS[0];
    var games=getGames(chart.period);
    var rows=makeRows(games,chart.period);
    var top5=rows.slice(0,5);
    var sorted=[].concat(games).sort(function(a,b){
      var pa=(a.date||"").split("/"),pb=(b.date||"").split("/");
      var sa=pa.length===3?pa[2]+pa[1]+pa[0]:(a.date||"");
      var sb=pb.length===3?pb[2]+pb[1]+pb[0]:(b.date||"");
      return sa.localeCompare(sb);
    });
    var [w,setW]=useState(500);
    var ref=React.useRef(null);
    React.useEffect(function(){
      if(!ref.current) return;
      var ro=new ResizeObserver(function(entries){setW(entries[0].contentRect.width||500);});
      ro.observe(ref.current);
      return function(){ro.disconnect();};
    },[]);
    var series=top5.map(function(p){
      var cum=0;
      return sorted.map(function(g){cum+=(g.pm?g.pm[p.id]||0:0);return cum;});
    });
    var H=160,PL=38,PB=18,PT=10,PR=8;
    var iW=w-PL-PR,iH=H-PB-PT,n=sorted.length;
    var allV=series.reduce(function(a,s){return a.concat(s);},[]);
    var minV=Math.min.apply(null,[0].concat(allV));
    var maxV=Math.max.apply(null,[1].concat(allV));
    var rng=maxV-minV||1;
    var sx=function(i){return PL+(n<2?iW/2:i/(n-1)*iW);};
    var sy=function(v){return PT+iH-((v-minV)/rng)*iH;};
    var z=sy(0);
    return (
      <div style={{ background:C.panelBg, border:"1px solid "+(editMode?C.gold+"88":C.gold+"22"), borderRadius:10, padding:"10px 14px", flex:1, minWidth:0, display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6, gap:4 }}>
          <div style={{ color:C.gold, fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:1.5, fontWeight:700 }}>📈 PUNTI CUMULATIVI — {opt.label.toUpperCase()}</div>
          {editMode && (
            <div style={{ display:"flex", gap:4, flexShrink:0 }}>
              <PSelect value={chart.period} onChange={function(v){setCharts(function(cs){return cs.map(function(c){return c.id===chart.id?Object.assign({},c,{period:v}):c;});});}}/>
              <button onClick={function(){setCharts(function(cs){return cs.filter(function(c){return c.id!==chart.id;});});}} style={{ background:C.red+"22", border:"1px solid "+C.red+"55", borderRadius:5, color:C.red, cursor:"pointer", fontSize:12, padding:"1px 7px" }}>✕</button>
            </div>
          )}
        </div>
        <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:6 }}>
          {top5.map(function(p,i){return (
            <div key={p.id} style={{ display:"flex", alignItems:"center", gap:5 }}>
              <div style={{ width:12,height:3,borderRadius:2,background:COLORS[i] }}/>
              <span style={{ color:COLORS[i], fontSize:10, fontWeight:700 }}>{p.name}</span>
            </div>
          );})}
        </div>
        <div ref={ref} style={{ flex:1, position:"relative", minHeight:H }}>
          {n<2
            ? <div style={{ color:C.muted, fontSize:12, textAlign:"center", paddingTop:30 }}>Dati insufficienti</div>
            : <svg width="100%" height={H} viewBox={"0 0 "+w+" "+H} preserveAspectRatio="none" style={{ display:"block", position:"absolute", inset:0 }}>
                {[minV,(minV+maxV)/2,maxV].map(function(v,ti){
                  var y=sy(v);
                  return (
                    <g key={ti}>
                      <line x1={PL} y1={y} x2={w-PR} y2={y} stroke={C.border} strokeOpacity=".3" strokeWidth="1"/>
                      <text x={PL-3} y={y+4} fill={C.muted} fontSize="9" textAnchor="end" vectorEffect="non-scaling-stroke">{Math.round(v)}</text>
                    </g>
                  );
                })}
                <line x1={PL} y1={z} x2={w-PR} y2={z} stroke={C.gold} strokeOpacity=".5" strokeWidth="1.5" strokeDasharray="5 4"/>
                {series.map(function(pts,pi){
                  if(pts.length<2) return null;
                  var d=pts.map(function(v,i){return(i===0?"M":"L")+sx(i).toFixed(1)+","+sy(v).toFixed(1);}).join(" ");
                  return <path key={pi} d={d} fill="none" stroke={COLORS[pi]} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke"/>;
                })}
                {top5.map(function(p,pi){
                  if(!series[pi]||series[pi].length===0) return null;
                  var lv=series[pi][series[pi].length-1];
                  return <circle key={pi} cx={sx(n-1)} cy={sy(lv)} r="5" fill={COLORS[pi]} stroke={C.darker} strokeWidth="2" vectorEffect="non-scaling-stroke"/>;

  return (

// ── PAGE: DASHBOARD ───────────────────────────────────────────────────────────
function PageDashboard({ players, allGames, raggi, giornoGames, raggioCorrenteNome, showPcDashGlobal, onClosePcDash }) {
  const [mode, setMode] = useState("assoluto"); // "assoluto" | "rapporto"
  const [showPcDash, setShowPcDash] = useState(false);
  React.useEffect(() => {
    const check = () => { if (window.innerWidth >= 900) setShowPcDash(true); };
    check();
    window.addEventListener("resize", check);
    return () => window.removeEventListener("resize", check);
  }, []);
  const pcVisible = showPcDash || showPcDashGlobal;
  const handleClosePc = () => { setShowPcDash(false); if (onClosePcDash) onClosePcDash(); };

  if (!allGames.length) return (
    <div className="page">
      {pcVisible && <DashboardPC players={players} allGames={allGames} giornoGames={giornoGames||[]} raggi={raggi} raggioCorrenteNome={raggioCorrenteNome} onClose={handleClosePc} />}

        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:26 }}>📊</span>

        </div>
      </div>
      <div style={{ textAlign:"center", padding:60, color:C.muted }}>
        <div style={{ fontSize:40, marginBottom:10, opacity:.4 }}>📊</div>
        Nessuna partita ancora.
      </div>
    </div>
  );

  const isRap = mode === "rapporto";

  // Calcola stats per ogni giocatore
  const stats = players.map(p => {
    const giocate  = allGames.filter(g => g.pids && g.pids.includes(p.id));
    const chiamate = allGames.filter(g => g.callerId === p.id);
    const socio    = allGames.filter(g => g.partnerId === p.id);
    const chiamateVinte  = chiamate.filter(g => g.callerWon);
    const chiamatePerse  = chiamate.filter(g => !g.callerWon);
    const socioVinte     = socio.filter(g => g.callerWon);
    const avversario     = giocate.filter(g => g.callerId !== p.id && g.partnerId !== p.id);
    const avversarioVinte= avversario.filter(g => !g.callerWon);
    const punteggio      = sumPts(p.id, allGames);
    const raggiVinti     = (raggi||[]).filter(r => r.winner === p.id || r.winner === p.name).length;

    // Cappotti subiti (era avversario e c'era cappotto e ha perso)
    const cappottiSubiti = avversario.filter(g => g.cappotto && !g.callerWon).length;
    const cappottiFatti  = chiamate.filter(g => g.cappotto && g.callerWon).length
                         + socio.filter(g => g.cappotto && g.callerWon).length;

    const n = giocate.length;
    return {
      p, n,
      chiamate:       chiamate.length,
      chiamateVinte:  chiamateVinte.length,
      chiamatePerse:  chiamatePerse.length,
      winRateChiamate: chiamate.length ? Math.round(chiamateVinte.length / chiamate.length * 100) : 0,
      socio:          socio.length,
      socioVinte:     socioVinte.length,
      winRateSocio:   socio.length ? Math.round(socioVinte.length / socio.length * 100) : 0,
      avversario:     avversario.length,
      avversarioVinte:avversarioVinte.length,
      winRateAvversario: avversario.length ? Math.round(avversarioVinte.length / avversario.length * 100) : 0,
      punteggio,
      raggiVinti,
      cappottiFatti,
      cappottiSubiti,
      ptsPerPartita:  n ? (punteggio / n).toFixed(1) : "0",
    };
  }).filter(s => s.n > 0);

  const fmt = (s, abs, pct) => isRap ? (pct !== undefined ? pct+"%" : abs+"/"+s.n) : abs;

  // Sezioni della dashboard
  const sections = [
    {
      title: "📣 Chi chiama di più?",
      rows: [...stats].sort((a,b) => isRap
        ? (b.chiamate/b.n - a.chiamate/a.n)

    },
    {

    {

    {
      title: "🎩 Cappotti",
      rows: [...stats].sort((a,b) => isRap
        ? (b.cappottiFatti/b.n - a.cappottiFatti/a.n)
        : (b.cappottiFatti - a.cappottiFatti)),
      val: s => isRap ? Math.round(s.cappottiFatti/s.n*100)+"%" : s.cappottiFatti,
      sub: s => s.cappottiFatti+" fatti · "+s.cappottiSubiti+" subiti",
      color: C.purple,
    },
    {
      title: "🏆 Raggi vinti",

  ];

  const StatCard = ({ section }) => {
